
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>2H</title><style>@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap');html,body{height:100%;margin:0;padding:0;background:#13151a;font-family:'Roboto Mono',monospace;font-size:12px;line-height:1;color:#fff;overflow-x:hidden}*{box-sizing:border-box}.top{display:flex;align-items:center;gap:24px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.12)}.top-filters{gap:12px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.08);justify-content:flex-start}.top-filters select{min-width:140px}.logo{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}select{background:transparent;border:none;outline:none;font-family:'Roboto Mono',monospace;font-size:12px;color:#fff;cursor:pointer;-webkit-appearance:none}select option{background:#13151a;color:#fff}.sr{margin-left:auto}.sr input{background:transparent;border:none;outline:none;border-bottom:1px solid rgba(255,255,255,0.25);font-family:'Roboto Mono',monospace;font-size:12px;color:#fff;width:160px;padding:2px 0}.sr input::placeholder{color:rgba(255,255,255,0.6)}.sr input:focus{border-bottom-color:#fff}.wrap{overflow-x:auto;overflow-y:auto;height:calc(100vh - 84px);-webkit-overflow-scrolling:touch}table{border-collapse:separate;border-spacing:0;width:max-content}thead{position:sticky;top:0;background:#13151a;z-index:10}tr.gh>th{font-size:11px;font-weight:600;color:#fff!important;letter-spacing:0.12em;text-transform:uppercase;padding:5px 12px 5px 0;text-align:left;background:#13151a;cursor:default;white-space:nowrap;border:none}tr.gh>th.blank{padding:0}tr.gh>th:first-child{padding-left:16px}tr.gh>th.gend{padding-right:32px!important}td.gsep{padding-left:24px!important}tr.ch>th.gsep{padding-left:24px!important}tr.gh>th.gsep{padding-left:24px!important}td.gsep-lg{padding-left:36px!important}tr.ch>th.gsep-lg{padding-left:36px!important}tr.gh>th.gsep-lg{padding-left:36px!important}tr.ch>th{font-size:12px;font-weight:600;color:#fff!important;padding:4px 12px 5px 0;text-align:left!important;background:#13151a;border-bottom:1px solid rgba(255,255,255,0.15);cursor:pointer;white-space:nowrap;user-select:none}tr.ch>th:first-child{padding-left:16px}tr.ch>th:hover{color:#00e676!important}tr.ch>th.s{color:#00e676!important}tr.ch>th.gend{padding-right:32px!important}td{padding:0 12px 0 0;height:26px;border:none;vertical-align:middle;white-space:nowrap;text-align:left;font-size:12px;color:#fff!important}td:first-child{padding-left:16px}td.gend{padding-right:32px!important}tr:hover>td{background:rgba(255,255,255,0.04)}.msg{padding:40px 16px;color:#fff;font-size:12px}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#13151a}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}.tip{position:relative;cursor:help}.tip::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:0;background:#0d0f13;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:400;line-height:1.6;padding:8px 10px;border-radius:4px;width:420px;max-height:480px;overflow-y:auto;white-space:pre-line;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.15s;font-family:'Roboto Mono',monospace;letter-spacing:0}.tip:hover::after{opacity:1}.nav-link{font-size:11px;color:#fff;cursor:pointer;font-family:'Roboto Mono',monospace;letter-spacing:0.05em;user-select:none;text-decoration:none}.spec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}.spec-overlay.on{display:flex}.spec-modal{background:#0d0f13;border:1px solid rgba(255,255,255,0.2);width:min(900px,95vw);max-height:90vh;display:flex;flex-direction:column;font-family:'Roboto Mono',monospace}.spec-head{display:flex;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.15);flex-shrink:0}.spec-head .t{font-size:13px;font-weight:600;color:#fff;letter-spacing:0.05em}.spec-head .m{font-size:11px;color:#fff;margin-left:auto}.spec-head .x{font-size:16px;color:#fff;cursor:pointer;padding:0 4px;user-select:none}.spec-body{overflow-y:auto;padding:16px 20px;font-size:11px;line-height:1.55;color:#fff;white-space:pre-wrap;font-family:'Roboto Mono',monospace;word-wrap:break-word}tr.ch>th:first-child{position:sticky;left:0;background:#13151a;z-index:11}tr.gh>th:first-child{position:sticky;left:0;background:#13151a;z-index:11}tbody td:first-child{position:sticky;left:0;background:#13151a;z-index:5}tbody tr:hover td:first-child{background:#1a1d24}.held{border-left:4px solid #fff!important;padding-left:12px!important}.tabs{display:flex;gap:4px}.tab{font-size:11px;color:rgba(255,255,255,0.55);cursor:pointer;letter-spacing:0.05em;user-select:none;padding:2px 2px}.tab.on{color:#fff}.tab:hover{color:#fff}.pwrap{overflow-y:auto;height:calc(100vh - 54px);padding:24px 16px;-webkit-overflow-scrolling:touch}.psec{margin-bottom:36px}.psec-title{font-size:11px;font-weight:600;color:#fff;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.15)}.pt{border-collapse:separate;border-spacing:0;font-size:12px;font-family:'Roboto Mono',monospace}.pt th{font-size:11px;font-weight:600;color:#fff;letter-spacing:0.05em;text-transform:uppercase;padding:4px 24px 6px 0;text-align:left;border-bottom:1px solid rgba(255,255,255,0.15);white-space:nowrap}.pt th.n{text-align:right}.pt td{padding:4px 24px 4px 0;text-align:left;white-space:nowrap;color:#fff;height:24px}.pt td.n{text-align:right;font-variant-numeric:tabular-nums}.pt td:first-child,.pt th:first-child{padding-left:0}.pt .tot td{border-top:1px solid rgba(255,255,255,0.25);font-weight:600;padding-top:8px}.summary-row{display:flex;gap:48px;margin-bottom:24px;font-family:'Roboto Mono',monospace}.summary-item{font-size:11px}.summary-item .lbl{color:rgba(255,255,255,0.55);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}.summary-item .val{font-size:18px;font-weight:600;color:#fff}</style></head><body>
<div class="top top-nav">
  <span class="logo" style="cursor:pointer" onclick="location.reload()">2H</span>
  <div class="tabs">
    <span class="tab on" id="tabUniv" onclick="setView('universe')">[UNIVERSE]</span>
    <span class="tab" id="tabPos" onclick="setView('positions')">[POSITIONS]</span>
    <span class="tab" id="tabPort" onclick="setView('portfolio')">[PORTFOLIO]</span>
    <span class="tab" id="tabMacro" onclick="setView('macro')">[MACRO]</span>
  </div>
  <span class="nav-link" onclick="openSpec()" title="System specification">[SPEC]</span>
  <a class="nav-link" href="https://simond-uti.github.io/2H/crossover_radar.html" target="_blank" title="Crossover radar">[RADAR]</a>
  <span class="nav-link" id="wltoggle" onclick="toggleWL()" style="margin-left:8px" title="Toggle UK / US">UK</span>
  <div class="sr"><input id="sr" placeholder="Search…" oninput="af()"></div>
</div>
<div class="top top-filters" id="filterbar">
  <select id="gsel" onchange="setGrp(this.value)"><option value="">All Groups</option></select>
  <select id="stsel" onchange="setState(this.value)">
    <option value="">All States</option>
    <option value="BULL ACCEL">Bull Accel</option>
    <option value="BULL ESTAB">Bull Estab</option>
    <option value="BULL FADING">Bull Fading</option>
    <option value="EARLY RECV">Early Recv</option>
    <option value="BEAR DECEL">Bear Decel</option>
    <option value="BEAR ACCEL">Bear Accel</option>
  </select>
  <select id="rgsel" onchange="setRegime(this.value)">
    <option value="">All Regimes</option>
    <option value="BUY">Buy</option>
    <option value="ACCUMULATE">Accumulate</option>
    <option value="HOLD">Hold</option>
    <option value="WATCH">Watch</option>
    <option value="RECOVERY">Recovery</option>
    <option value="TRIM">Trim</option>
    <option value="TRAP">Trap</option>
    <option value="EXHAUSTION">Exhaustion</option>
    <option value="AVOID">Avoid</option>
    <option value="LOCKOUT">Lockout</option>
    <option value="STALE">Stale</option>
  </select>
</div>
<div class="top top-filters" id="macroSubNav" style="display:none;border-bottom:1px solid rgba(255,255,255,0.08)">
  <div class="tabs">
    <span class="tab on" id="mpRr" onclick="setMacro('riskranges')">[RISK RANGES]</span>
    <span class="tab" id="mpSectors" onclick="setMacro('sectors')">[SECTORS]</span>
    <span class="tab" id="mpVol" onclick="setMacro('volatility')">[VOLATILITY]</span>
  </div>
</div>
<div class="wrap" id="wrap-main">
  <table><thead id="th-host"></thead><tbody id="tb"><tr><td colspan="18" class="msg">Loading…</td></tr></tbody></table>
</div>
<div class="pwrap" id="wrap-portfolio" style="display:none"><div id="portfolio-host">Loading…</div></div>
<div class="wrap" id="wrap-macro" style="display:none"><div id="macro-host" style="overflow:auto"><div class="msg">Loading…</div></div></div>
<script>
var SURL='https://pzskvslhfaituzyukasl.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6c2t2c2xoZmFpdHV6eXVrYXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzQyNTAsImV4cCI6MjA3OTY1MDI1MH0.FEZTIIQ4zgdb7uswf70XZI9Ph6ykSeDkfxooIcRIOMw';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY};
var G='#4ade80',R='#ff1744',W='#fff';

var tooltips={};
async function loadTooltips(){
  try{
    var res=await fetch(SURL+'/rest/v1/tooltip_definitions?select=column_key,label,description,construction,thresholds,decision_use',{headers:H});
    if(!res.ok)return;
    var data=await res.json();
    data.forEach(function(t){tooltips[t.column_key]=t;});
    if(view==='universe'||view==='positions')renderHeader();
  }catch(e){console.warn('tooltips:',e);}
}
function tip(key){
  var t=tooltips[key];
  if(!t)return '';
  return t.label+'\n\n'+t.description+'\n\nCONSTRUCTION\n'+t.construction+'\n\nTHRESHOLDS\n'+t.thresholds+'\n\nDECISION USE\n'+t.decision_use;
}
function tipAttr(key){var s=tip(key);return s?' data-tip="'+s.replace(/"/g,'&quot;')+'"':'';}

var REGIME_COLS='symbol,name,group_name,watchlist,trend,momentum,trend_d10,state_name,slope_annual_pct,z_score,perf_1d,perf_5d,perf_1m,flip_s,flip_t,flip_m,regime';
var all=[],filt=[],positions=new Set(),positionSizing={};
var sc='trend',sd=-1,wl='UK ETFS',grp='',state='',regime='',view='universe',macroPreset='riskranges';

function parseRow(r){
  return Object.assign({},r,{
    slope:r.slope_annual_pct!=null?parseFloat(r.slope_annual_pct):null,
    z_score:r.z_score!=null?parseFloat(r.z_score):null,
    trend_d10:r.trend_d10!=null?parseFloat(r.trend_d10):null,
    flip_s:parseInt(r.flip_s)||0,flip_t:parseInt(r.flip_t)||0,flip_m:parseInt(r.flip_m)||0
  });
}
async function load(){
  var tb=document.getElementById('tb');
  try{
    if(view==='positions'){await loadPositions();}
    else{
      var wlFilter='&watchlist=in.('+encodeURIComponent(wl)+',BOTH)';
      var [regRes,posRes]=await Promise.all([
        fetch(SURL+'/rest/v1/v_2h_regime?select='+REGIME_COLS+wlFilter+'&limit=300',{headers:H}),
        fetch(SURL+'/rest/v1/positions?select=symbol',{headers:H})
      ]);
      if(!regRes.ok){var b=await regRes.text().catch(function(){return'';});throw new Error('regime: '+regRes.status+' — '+b.slice(0,250));}
      var regData=await regRes.json();
      if(posRes.ok){var pos=await posRes.json();positions=new Set(pos.map(function(p){return p.symbol;}));if(positions.has('BIT-XBTE'))positions.add('BTCUSD');}
      all=regData.map(parseRow);
    }
    buildGroups();af();
  }catch(e){tb.innerHTML='<tr><td colspan="18" class="msg">Error — '+e.message+'</td></tr>';}
}
async function loadPositions(){
  var posRes=await fetch(SURL+'/rest/v1/positions?select=symbol',{headers:H});
  if(!posRes.ok)throw new Error('positions: '+posRes.status);
  var pos=await posRes.json();
  positions=new Set(pos.map(function(p){return p.symbol;}).filter(function(s){return s&&s!=='CASH'&&s!=='Cash';}));
  if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
  var symList=Array.from(positions).map(encodeURIComponent).join(',');
  var [sizeRes,regRes]=await Promise.all([
    fetch(SURL+'/rest/v1/v_positions_with_sizing?select=symbol,portfolio_pct,effective_max_pct,pct_of_max,value_gbp',{headers:H}),
    fetch(SURL+'/rest/v1/v_2h_regime?select='+REGIME_COLS+'&symbol=in.('+symList+')&limit=100',{headers:H})
  ]);
  if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
  if(!regRes.ok){var b=await regRes.text().catch(function(){return'';});throw new Error('regime: '+regRes.status+' — '+b.slice(0,200));}
  positionSizing={};
  (await sizeRes.json()).forEach(function(s){
    if(!s.symbol||s.symbol==='CASH'||s.symbol==='Cash')return;
    var entry={portfolio_pct:parseFloat(s.portfolio_pct)||0,effective_max_pct:parseFloat(s.effective_max_pct)||0,pct_of_max:parseFloat(s.pct_of_max)||0,value_gbp:parseFloat(s.value_gbp)||0};
    positionSizing[s.symbol]=entry;if(s.symbol==='BIT-XBTE')positionSizing['BTCUSD']=entry;
  });
  all=(await regRes.json()).map(function(r){return Object.assign(parseRow(r),positionSizing[r.symbol]||{});});
}

function setView(v){
  view=v;
  document.getElementById('tabUniv').classList.toggle('on',v==='universe');
  document.getElementById('tabPos').classList.toggle('on',v==='positions');
  document.getElementById('tabPort').classList.toggle('on',v==='portfolio');
  document.getElementById('tabMacro').classList.toggle('on',v==='macro');
  document.getElementById('wltoggle').style.display='';
  document.getElementById('macroSubNav').style.display=v==='macro'?'':'none';
  if(v==='universe'||v==='positions'){document.getElementById('filterbar').style.display='';document.getElementById('wrap-main').style.display='';document.getElementById('wrap-portfolio').style.display='none';document.getElementById('wrap-macro').style.display='none';}
  else if(v==='portfolio'){document.getElementById('filterbar').style.display='none';document.getElementById('wrap-main').style.display='none';document.getElementById('wrap-portfolio').style.display='';document.getElementById('wrap-macro').style.display='none';}
  else if(v==='macro'){document.getElementById('wrap-portfolio').style.display='none';}
  grp='';state='';regime='';
  ['gsel','stsel','rgsel'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  if(v==='portfolio')loadPortfolio();
  else if(v==='macro'){macroPreset='riskranges';setMacro('riskranges');}
  else{renderHeader();load();}
}

function renderHeader(){
  var h=document.getElementById('th-host');
  var showSize=view==='positions';
  var sizeGH=showSize?'<th colspan="4" class="gsep-lg gend">Size</th>':'';
  var sizeCH=showSize?
    '<th class="gsep-lg tip" style="min-width:54px" onclick="sb(\'portfolio_pct\')" data-tip="PORT % — Current portfolio weight across all accounts.">Port%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'effective_max_pct\')" data-tip="MAX % — SPX-vol-adjusted maximum position size.">Max%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'pct_of_max\')" data-tip="% OF MAX — Current size as % of max. >100% = oversized.">%Max</th>'+
    '<th class="tip gend" style="min-width:76px" onclick="sb(\'value_gbp\')" data-tip="VALUE — GBP value across all accounts.">Value</th>':'';
  h.innerHTML=
    '<tr class="gh"><th class="blank" colspan="2"></th>'+sizeGH+
    '<th colspan="4" class="gsep-lg gend">State + Flips</th>'+
    '<th colspan="5" class="gsep gend">Core 5</th>'+
    '<th colspan="1" class="gsep gend">Regime</th>'+
    '<th colspan="3" class="gsep gend">Recent</th></tr>'+
    '<tr class="ch">'+
    '<th style="min-width:70px;padding-left:16px" onclick="sb(\'symbol\')">Ticker</th>'+
    '<th style="min-width:80px;max-width:100px" onclick="sb(\'group_name\')">Group</th>'+
    sizeCH+
    '<th class="gsep-lg tip" style="min-width:110px" onclick="sb(\'state_name\')"'+tipAttr('state')+'>State</th>'+
    '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_s\')"'+tipAttr('flip_s')+'>S</th>'+
    '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_t\')"'+tipAttr('flip_t')+'>T</th>'+
    '<th class="tip gend" style="min-width:28px;text-align:center" onclick="sb(\'flip_m\')"'+tipAttr('flip_m')+'>M</th>'+
    '<th class="gsep tip" style="min-width:62px" onclick="sb(\'slope\')"'+tipAttr('slope')+'>Slope</th>'+
    '<th class="tip" style="min-width:52px" onclick="sb(\'trend\')"'+tipAttr('trend')+'>Trend</th>'+
    '<th class="tip" style="min-width:52px" onclick="sb(\'momentum\')"'+tipAttr('trade')+'>Trade</th>'+
    '<th class="tip" style="min-width:50px" onclick="sb(\'z_score\')"'+tipAttr('z')+'>z</th>'+
    '<th class="tip gend" style="min-width:54px" onclick="sb(\'trend_d10\')"'+tipAttr('t_d10')+'>T.d10</th>'+
    '<th class="gsep tip gend" style="min-width:120px" onclick="sb(\'regime\')"'+tipAttr('regime')+'>Regime</th>'+
    '<th class="gsep tip" style="min-width:54px" onclick="sb(\'perf_1d\')" data-tip="1D% — Today\'s return">1D%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'perf_5d\')" data-tip="5D% — 5-bar return">5D%</th>'+
    '<th class="tip gend" style="min-width:54px" onclick="sb(\'perf_1m\')" data-tip="1M% — ~21-bar return">1M%</th></tr>';
}

function toggleWL(){wl=(wl==='UK ETFS')?'MAIN':'UK ETFS';document.getElementById('wltoggle').textContent=(wl==='UK ETFS')?'UK':'US';if(view==='macro'&&macroPreset==='sectors')loadMacroSectors();else load();}
function setGrp(g){grp=g;af();}
function setState(s){state=s;af();}
function setRegime(r){regime=r;af();}
function titleCase(s){if(!s)return s;return s.toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});}
function buildGroups(){
  var b=(view==='universe'&&wl)?all.filter(function(r){return r.watchlist===wl||r.watchlist==='BOTH';}):all;
  var gs=Array.from(new Set(b.map(function(r){return r.group_name;}).filter(Boolean))).sort();
  var sel=document.getElementById('gsel');var cur=sel.value;
  sel.innerHTML='<option value="">All Groups</option>'+gs.map(function(g){return'<option value="'+g+'"'+(g===cur?' selected':'')+'>'+titleCase(g)+'</option>';}).join('');
  if(gs.indexOf(grp)<0){sel.value='';grp='';}
}
function base(){
  return all.filter(function(r){
    if(view==='universe'&&wl&&r.watchlist!==wl&&r.watchlist!=='BOTH')return false;
    if(grp&&r.group_name!==grp)return false;
    if(state&&r.state_name!==state)return false;
    if(regime&&r.regime!==regime)return false;
    return true;
  });
}
function af(){
  var s=document.getElementById('sr').value.toLowerCase();
  filt=base().filter(function(r){
    if(s&&(r.symbol||'').toLowerCase().indexOf(s)<0&&(r.name||'').toLowerCase().indexOf(s)<0&&(r.group_name||'').toLowerCase().indexOf(s)<0)return false;
    return true;
  });
  sort();render();
}
function sb(c){if(sc===c)sd*=-1;else{sc=c;sd=-1;}document.querySelectorAll('tr.ch th').forEach(function(t){t.classList.remove('s');});if(event&&event.target)event.target.classList.add('s');sort();render();}
function sort(){filt.sort(function(a,b){var av=a[sc],bv=b[sc];if(av==null)av=sd>0?Infinity:-Infinity;if(bv==null)bv=sd>0?Infinity:-Infinity;if(typeof av==='string')return av.localeCompare(bv)*sd;return(av-bv)*sd;});}

var dash='<span style="color:'+W+'">—</span>';
function numSigned(v,d){if(d===undefined)d=1;if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>0?G:f<0?R:W)+'">'+f.toFixed(d)+'</span>';}
function pctFmt(v,d){if(d===undefined)d=1;if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>0?G:f<0?R:W)+'">'+(f>=0?'+':'')+f.toFixed(d)+'%</span>';}
function slopeCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>5?G:f<-5?R:W)+'">'+(f>0?'+':'')+f.toFixed(1)+'%</span>';}
function zCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f<=-1?G:f>=1?R:W)+'">'+(f>0?'+':'')+f.toFixed(2)+'</span>';}
function rocCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>1?G:f<-1?R:W)+'">'+(f>0?'+':'')+f.toFixed(1)+'</span>';}
function stateCell(v){if(!v)return dash;var col=W;if(v==='BULL ACCEL'||v==='BULL ESTAB')col=G;else if(v==='BEAR DECEL'||v==='BEAR ACCEL')col=R;return'<span style="color:'+col+'">'+v+'</span>';}
function flipCell(v){var n=parseInt(v)||0;if(n===0)return dash;return'<span style="color:'+(n>0?G:R)+'">'+(n>0?'▲':'▼')+'</span>';}
var REGIME_COL={'BUY':G,'ACCUMULATE':G,'HOLD':W,'WATCH':W,'RECOVERY':W,'TRIM':R,'TRAP':R,'EXHAUSTION':R,'AVOID':R,'LOCKOUT':R,'STALE':'rgba(255,255,255,0.35)'};
function regimeCell(v){if(!v||v==='—')return dash;return'<span style="color:'+(REGIME_COL[v]||W)+'">'+v+'</span>';}
function portPctCell(v){if(v==null||isNaN(v))return dash;return'<span style="color:'+W+'">'+parseFloat(v).toFixed(1)+'%</span>';}
function maxPctCell(v){if(v==null||isNaN(v))return dash;return'<span style="color:'+W+'">'+parseFloat(v).toFixed(1)+'%</span>';}
function pctMaxCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>100?R:W)+'">'+Math.round(f)+'%</span>';}
function valueCell(v){if(v==null||isNaN(v))return dash;return'<span style="color:'+W+'">£'+Math.round(parseFloat(v)).toLocaleString('en-GB')+'</span>';}

function render(){
  var tb=document.getElementById('tb');
  if(!filt.length){tb.innerHTML='<tr><td colspan="18" class="msg">No results</td></tr>';return;}
  var showSize=view==='positions';
  tb.innerHTML=filt.map(function(r){
    var isHeld=positions.has(r.symbol);
    var nameEsc=(r.name||'').replace(/"/g,'&quot;');
    var tk=isHeld?'<td class="held" title="'+nameEsc+'"><span style="color:'+W+';font-weight:600">'+r.symbol+'</span></td>':'<td title="'+nameEsc+'"><span style="color:'+W+';font-weight:600">'+r.symbol+'</span></td>';
    var sz=showSize?'<td class="gsep-lg">'+portPctCell(r.portfolio_pct)+'</td><td>'+maxPctCell(r.effective_max_pct)+'</td><td>'+pctMaxCell(r.pct_of_max)+'</td><td class="gend">'+valueCell(r.value_gbp)+'</td>':'';
    return'<tr>'+tk+
      '<td><span style="color:'+W+';max-width:100px;overflow:hidden;text-overflow:ellipsis;display:block;white-space:nowrap;font-size:11px">'+(r.group_name||'')+'</span></td>'+
      sz+
      '<td class="gsep-lg">'+stateCell(r.state_name)+'</td>'+
      '<td style="text-align:center">'+flipCell(r.flip_s)+'</td>'+
      '<td style="text-align:center">'+flipCell(r.flip_t)+'</td>'+
      '<td class="gend" style="text-align:center">'+flipCell(r.flip_m)+'</td>'+
      '<td class="gsep">'+slopeCell(r.slope)+'</td>'+
      '<td>'+numSigned(r.trend)+'</td>'+
      '<td>'+numSigned(r.momentum)+'</td>'+
      '<td>'+zCell(r.z_score)+'</td>'+
      '<td class="gend">'+rocCell(r.trend_d10)+'</td>'+
      '<td class="gsep gend">'+regimeCell(r.regime)+'</td>'+
      '<td class="gsep">'+pctFmt(r.perf_1d)+'</td>'+
      '<td>'+pctFmt(r.perf_5d)+'</td>'+
      '<td class="gend">'+pctFmt(r.perf_1m)+'</td></tr>';
  }).join('');
}

async function loadPortfolio(){
  var host=document.getElementById('portfolio-host');host.textContent='Loading…';
  try{
    var [perfRes,accRes,sizeRes,benchRes]=await Promise.all([
      fetch(SURL+'/rest/v1/v_portfolio_performance?select=*',{headers:H}),
      fetch(SURL+'/rest/v1/positions?select=account,symbol,value_gbp',{headers:H}),
      fetch(SURL+'/rest/v1/v_positions_with_sizing?select=symbol,value_gbp,group_name,sub_group,portfolio_pct',{headers:H}),
      fetch(SURL+'/rest/v1/v_crossover_states?symbol=in.(SPX,NDX,RUT)&select=symbol,perf_1d,perf_5d,perf_1m,perf_3m',{headers:H})
    ]);
    if(!perfRes.ok)throw new Error('performance: '+perfRes.status);if(!accRes.ok)throw new Error('accounts: '+accRes.status);if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
    renderPortfolio(await perfRes.json(),await accRes.json(),await sizeRes.json(),benchRes.ok?await benchRes.json():[]);
  }catch(e){host.innerHTML='<div style="padding:40px 0;color:'+R+'">Error — '+e.message+'</div>';}
}
function gbp(v){if(v==null||isNaN(v))return'-';return'£'+Math.round(parseFloat(v)).toLocaleString('en-GB');}
function gbpSigned(v){if(v==null||isNaN(v))return'-';var n=Math.round(parseFloat(v));return'<span style="color:'+(n>0?G:n<0?R:W)+'">'+(n>=0?'+':'')+'£'+Math.abs(n).toLocaleString('en-GB')+'</span>';}
function pctSigned(v,d){if(d===undefined)d=2;if(v==null||isNaN(v))return'-';var n=parseFloat(v);return'<span style="color:'+(n>0?G:n<0?R:W)+'">'+(n>=0?'+':'')+n.toFixed(d)+'%</span>';}
function renderPortfolio(perf,accRaw,sizeRaw,benchmarks){
  var host=document.getElementById('portfolio-host');
  var daily=perf.find(function(p){return p.period==='Daily';})||{};
  var tv=parseFloat(daily.end_value)||0,tg=parseFloat(daily.gain_value)||0,tp=parseFloat(daily.gain_pct)||0,tc=tg>=0?G:R;
  var summary='<div class="summary-row"><div class="summary-item"><div class="lbl">Total Value</div><div class="val">'+gbp(tv)+'</div></div><div class="summary-item"><div class="lbl">Today</div><div class="val" style="color:'+tc+'">'+(tg>=0?'+':'')+gbp(Math.abs(tg))+' ('+(tp>=0?'+':'')+tp.toFixed(2)+'%)</div></div></div>';
  var periods=['Daily','WoW','MTD','QTD','YTD','All Time'],pr='';
  periods.forEach(function(p){var d=perf.find(function(x){return x.period===p;})||{};var gv=parseFloat(d.gain_value)||0,gp=parseFloat(d.gain_pct)||0,cf=parseFloat(d.net_cash_flow)||0,rg=parseFloat(d.real_gain)||0,rp=parseFloat(d.real_gain_pct)||0,hc=Math.abs(cf)>1;pr+='<tr><td>'+p+'</td><td class="n">'+gbpSigned(gv)+'</td><td class="n">'+pctSigned(gp)+'</td><td class="n">'+(hc?gbpSigned(cf):'-')+'</td><td class="n">'+(hc?gbpSigned(rg):'-')+'</td><td class="n">'+(hc?pctSigned(rp):'-')+'</td></tr>';});
  var perfSec='<div class="psec"><div class="psec-title">Performance</div><table class="pt"><thead><tr><th>Period</th><th class="n">Gain £</th><th class="n">Gain %</th><th class="n">Cash Flow</th><th class="n">Real Gain £</th><th class="n">Real %</th></tr></thead><tbody>'+pr+'</tbody></table></div>';
  var pp={'1d':parseFloat((perf.find(function(p){return p.period==='Daily';})||{}).gain_pct)||0,'5d':parseFloat((perf.find(function(p){return p.period==='WoW';})||{}).gain_pct)||0,'1m':parseFloat((perf.find(function(p){return p.period==='MTD';})||{}).gain_pct)||0};
  var bo=['SPX','NDX','RUT'],bn={'SPX':'S&P 500','NDX':'NASDAQ','RUT':'Russell 2000'};
  var br='<tr><td>Portfolio</td><td class="n">'+pctSigned(pp['1d'])+'</td><td class="n">'+pctSigned(pp['5d'])+'</td><td class="n">'+pctSigned(pp['1m'])+'</td><td class="n">-</td></tr>';
  bo.forEach(function(sym){var b=benchmarks.find(function(x){return x.symbol===sym;});if(b)br+='<tr><td>'+bn[sym]+'</td><td class="n">'+pctSigned(b.perf_1d)+'</td><td class="n">'+pctSigned(b.perf_5d)+'</td><td class="n">'+pctSigned(b.perf_1m)+'</td><td class="n">'+pctSigned(b.perf_3m)+'</td></tr>';});
  var benchSec='<div class="psec"><div class="psec-title">vs US Indices</div><table class="pt"><thead><tr><th></th><th class="n">1D</th><th class="n">5D</th><th class="n">1M</th><th class="n">3M</th></tr></thead><tbody>'+br+'</tbody></table></div>';
  var accounts={},totalCash=0,totalVal=0;
  accRaw.forEach(function(p){if(!accounts[p.account])accounts[p.account]={value:0,cash:0};var v=parseFloat(p.value_gbp)||0;accounts[p.account].value+=v;totalVal+=v;if(p.symbol==='CASH'||p.symbol==='Cash'){accounts[p.account].cash+=v;totalCash+=v;}});
  var ao=['Si SIPP','Si SIPP II','Si ISA','Wife ISA'];
  var as=Object.entries(accounts).sort(function(a,b){var ai=ao.indexOf(a[0]),bi=ao.indexOf(b[0]);if(ai>=0&&bi>=0)return ai-bi;if(ai>=0)return-1;if(bi>=0)return 1;return b[1].value-a[1].value;});
  var ar='';as.forEach(function(e){var n=e[0],d=e[1],cp=d.value>0?(d.cash/d.value*100):0;ar+='<tr><td>'+n+'</td><td class="n">'+gbp(d.value)+'</td><td class="n">'+gbp(d.cash)+'</td><td class="n">'+cp.toFixed(1)+'%</td></tr>';});
  ar+='<tr class="tot"><td>TOTAL</td><td class="n">'+gbp(totalVal)+'</td><td class="n">'+gbp(totalCash)+'</td><td class="n">'+(totalVal>0?(totalCash/totalVal*100):0).toFixed(1)+'%</td></tr>';
  var accSec='<div class="psec"><div class="psec-title">Accounts</div><table class="pt"><thead><tr><th>Account</th><th class="n">Value</th><th class="n">Cash</th><th class="n">Cash %</th></tr></thead><tbody>'+ar+'</tbody></table></div>';
  var gs={},gtv=0,st={};
  sizeRaw.forEach(function(p){if(!p.symbol||p.symbol==='CASH'||p.symbol==='Cash')return;var v=parseFloat(p.value_gbp)||0,pc=parseFloat(p.portfolio_pct)||0;if(!st[p.symbol])st[p.symbol]={symbol:p.symbol,value:0,pct:0,group:p.group_name};st[p.symbol].value+=v;st[p.symbol].pct+=pc;});
  Object.values(st).forEach(function(pos){var g=pos.group||'OTHER';if(!gs[g])gs[g]={count:0,value:0,positions:[]};gs[g].count++;gs[g].value+=pos.value;gtv+=pos.value;gs[g].positions.push(pos);});
  var gso=Object.entries(gs).sort(function(a,b){if(a[0]==='CASH')return 1;if(b[0]==='CASH')return-1;return b[1].value-a[1].value;});
  var gr='';gso.forEach(function(e){var n=e[0],d=e[1],ap=gtv>0?(d.value/gtv*100):0;d.positions.sort(function(a,b){return b.value-a.value;});var pt=d.positions.map(function(p){return'<span style="margin-right:18px;white-space:nowrap"><span style="color:'+W+'">'+p.symbol+'</span> <span style="color:rgba(255,255,255,0.55)">'+p.pct.toFixed(1)+'%</span></span>';}).join('');gr+='<tr><td>'+n+'</td><td class="n">'+d.count+'</td><td class="n">'+ap.toFixed(1)+'%</td><td class="n">'+gbp(d.value)+'</td><td style="padding-left:32px;font-size:11px">'+(pt||'-')+'</td></tr>';});
  host.innerHTML=summary+perfSec+benchSec+accSec+'<div class="psec"><div class="psec-title">By Group</div><table class="pt"><thead><tr><th>Group</th><th class="n">#</th><th class="n">Alloc%</th><th class="n">Value</th><th style="padding-left:32px">Positions</th></tr></thead><tbody>'+gr+'</tbody></table></div>';
}

var GROUP_ORDER={'BONDS':1,'US INDICES':2,'US SECTORS':3,'COUNTRIES':4,'VOLATILITY':5,'CURRENCIES':6,'ENERGY':7,'COMMODITIES':8,'GOLD':9,'PRECIOUS METALS':10,'STOCKS':11,'CRYPTO':12,'MINERS':13,'GLOBAL FACTORS':14,'OTHER':99};
function rrTrendColor(t){if(!t)return W;var u=t.toUpperCase();return u==='BULLISH'?G:u==='BEARISH'?R:W;}
function rrFormatPrice(v){if(v==null||isNaN(v))return dash;var n=parseFloat(v);if(n>=1000)return n.toLocaleString('en-US',{maximumFractionDigits:0});return n<10?n.toFixed(4):n.toFixed(2);}
function rrPosCell(p){if(p==null||isNaN(p))return dash;var n=parseFloat(p);return'<span style="color:'+(n>=75?R:n<=25?G:W)+'">'+Math.round(n)+'%</span>';}
function rrChgCell(v){if(v==null||isNaN(v))return dash;var n=parseFloat(v);return'<span style="color:'+(n>0?G:n<0?R:W)+'">'+(n>=0?'+':'')+n.toFixed(2)+'%</span>';}
function numGrad(v){if(v==null||isNaN(v))return dash;var n=parseFloat(v);return'<span style="color:'+(n>0?G:n<0?R:W)+'">'+(n>0?'+':'')+n.toFixed(1)+'</span>';}
function macroStateCell(s){if(!s)return dash;var c={'BULL ACCEL':G,'BULL ESTAB':G,'BEAR DECEL':R,'BEAR ACCEL':R};return'<span style="color:'+(c[s]||W)+'">'+s+'</span>';}
function setMacro(p){

}

  }catch(e){host.innerHTML='<div class="msg" style="color:'+R+'">Error — '+e.message+'</div>';}

async function openSpec(){document.getElementById('specOverlay').classList.add('on');var body=document.getElementById('specBody'),head=document.getElementById('specHead');body.textContent='Loading…';head.textContent='...';
try{var res=await fetch(SURL+'/rest/v1/spec_2h_sections?select=section_order,section_title,content,updated_at&order=section_order.asc',{headers:H});if(!res.ok)throw new Error('HTTP '+res.status);var s=await res.json();if(!s.length){body.textContent='Empty.';return;}
var latest=s.reduce(function(a,x){var d=new Date(x.updated_at);return d>a?d:a;},new Date(0));
body.textContent=s.map(function(x){return x.section_order+'. '+x.section_title+'\n'+'='.repeat(x.section_title.length)+'\n'+x.content.trim()+'\n';}).join('\n\n');
head.textContent=s.length+' sections · updated '+latest.toISOString().slice(0,10);
}catch(e){body.textContent='Error: '+e.message;}}
function closeSpec(){document.getElementById('specOverlay').classList.remove('on');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSpec();});

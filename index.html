">Buy</option> <option value="RECOVERY+">Recovery+</option> <option value="RECOVERY">Recovery</option> <option value="TRAP">Trap</option> <option value="TRIM">Trim</option> <option value="EXHAUSTION">Exhaustion</option> <option value="WAIT">Wait</option> <option value="__ANY__">Any actionable</option> </select> <select id="regsel" onchange="setReg(this.value)"> <option value="">All Reg States</option> <option value="PULLBACK IN TREND">Pullback In Trend</option> <option value="OVERSOLD">Oversold</option> <option value="NEUTRAL">Neutral</option> <option value="EXTENDED">Extended</option> <option value="EXTREME TOP">Extreme Top</option> </select> <select id="volsel" onchange="setVolReg(this.value)"> <option value="">All Vol Regimes</option> <option value="LOW">Low</option> <option value="NORM">Norm</option> <option value="HIGH">High</option> <option value="EXTREME">Extreme</option> </select> <select id="fpsel" onchange="setFp(this.value)"> <option value="">Any fp count</option> <option value="1">fp ≥ 1</option> <option value="2">fp ≥ 2</option> <option value="3">fp ≥ 3</option> <option value="4">fp = 4</option> </select> </div><div class="top top-filters" id="macroSubNav" style="display:none;border-bottom:1px solid rgba(255,255,255,0.08)"><div class="tabs"><span class="tab on" id="mpRr" onclick="setMacro('riskranges')">[RISK RANGES]</span><span class="tab" id="mpSectors" onclick="setMacro('sectors')">[SECTORS]</span><span class="tab" id="mpVol" onclick="setMacro('volatility')">[VOLATILITY]</span></div></div><div class="wrap" id="wrap-main"><table> <thead id="th-host"></thead> <tbody id="tb"><tr><td colspan="25" class="msg">Loading…</td></tr></tbody></table></div><div class="pwrap" id="wrap-portfolio" style="display:none"><div id="portfolio-host">Loading…</div></div><div class="wrap" id="wrap-macro" style="display:none"><div id="macro-host" style="overflow:auto"><div class="msg">Loading…</div></div></div><script>

function newCell(stateDirection){
  const col=(stateDirection==='UP')?G:R;
  return ` <span style="color:${col};font-size:9px;font-weight:700">NEW</span>`;

const GUIDE_COLS='symbol,name,group_name,watchlist,trend,momentum,state_name,state_changed,rank_move,prev_state,state_direction,trend_d5,trend_d10,trend_d21,perf_1d,perf_5d,perf_1m';
const CAL_COLS='ticker,symbol,bar_date,close,watchlist,group_name,slope_21,slope_63,slope_252,z_21,z_63,z_252,vol_z,range_z,corr_z,auto_z,fp_count,reg_state,tier,vol_regime,vel_pattern,is_fresh';

let all=[],filt=[],positions=new Set(),positionSizing={},sc='tier_sort',sd=1,wl='UK ETFS',grp='',state='',alertMode='',tier='',regstate='',volreg='',fpmin='',view='universe',macroPreset='riskranges';

function stripPrefix(t){if(!t)return t;const i=t.indexOf(':');return i>=0?t.slice(i+1):t;}

function tierSortKey(t){
  if(t==='BUY STRONG')return 1;
  if(t==='BUY')return 2;
  if(t==='RECOVERY+')return 3;
  if(t==='RECOVERY')return 4;
  if(t==='TRAP')return 5;
  if(t==='TRIM')return 6;
  if(t==='EXHAUSTION')return 7;
  if(t==='WAIT')return 8;
  return 99;
}

async function load(){
  const tb=document.getElementById('tb');
  try{
    if(view==='positions'){
      await loadPositions();
    }else{
      const wlEnc=encodeURIComponent(wl);
      const wlFilter=`&watchlist=in.(${wlEnc},BOTH)`;
      const [calRes,guideRes,posRes]=await Promise.all([
        fetch(`${SURL}/rest/v1/v_2h_calibrated_v1_latest?select=${CAL_COLS}${wlFilter}&limit=500`,{headers:H}),
        fetch(`${SURL}/rest/v1/v_2h_guidance?select=${GUIDE_COLS}${wlFilter}&limit=500`,{headers:H}),
        fetch(`${SURL}/rest/v1/positions?select=symbol`,{headers:H})
      ]);
      async function bail(label,res){
        if(res.ok)return;
        const body=await res.text().catch(()=>'(no body)');
        throw new Error(`${label}: ${res.status} — ${body.slice(0,250)}`);
      }
      await bail('calibrated',calRes);
      await bail('guide',guideRes);
      const calData=await calRes.json();
      const guideData=await guideRes.json();
      if(posRes.ok){
        const pos=await posRes.json();
        positions=new Set(pos.map(p=>p.symbol));
        if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
      }
      const gmap={};
      guideData.forEach(g=>{gmap[g.symbol]=g;});
      all=calData.map(r=>{
        const sym=r.symbol||stripPrefix(r.ticker);
        const g=gmap[sym]||{};
        return Object.assign({},r,{
          symbol:sym,
          name:g.name||'',
          trend:g.trend!=null?parseFloat(g.trend):null,
          momentum:g.momentum!=null?parseFloat(g.momentum):null,
          state_name:g.state_name||null,
          state_changed:g.state_changed||false,
          state_direction:g.state_direction||null,
          rank_move:g.rank_move!=null?parseInt(g.rank_move):null,
          trend_d5:g.trend_d5!=null?parseFloat(g.trend_d5):null,
          trend_d10:g.trend_d10!=null?parseFloat(g.trend_d10):null,
          trend_d21:g.trend_d21!=null?parseFloat(g.trend_d21):null,
          perf_1d:g.perf_1d!=null?parseFloat(g.perf_1d):null,
          perf_5d:g.perf_5d!=null?parseFloat(g.perf_5d):null,
          perf_1m:g.perf_1m!=null?parseFloat(g.perf_1m):null,
          tier_sort:tierSortKey(r.tier)
        });
      });
    }
    buildGroups();af();
  }catch(e){
    tb.innerHTML=`<tr><td colspan="25" class="msg">Error — ${e.message}</td></tr>`;
  }
}

async function loadPositions(){
  const posRes=await fetch(`${SURL}/rest/v1/positions?select=symbol`,{headers:H});
  if(!posRes.ok)throw new Error('positions: '+posRes.status);
  const pos=await posRes.json();
  positions=new Set(pos.map(p=>p.symbol).filter(s=>s&&s!=='CASH'&&s!=='Cash'));
  if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
  const symList=[...positions].map(s=>encodeURIComponent(s)).join(',');
  const [sizeRes,calRes,guideRes]=await Promise.all([
    fetch(`${SURL}/rest/v1/v_positions_with_sizing?select=symbol,portfolio_pct,effective_max_pct,pct_of_max,value_gbp`,{headers:H}),
    fetch(`${SURL}/rest/v1/v_2h_calibrated_v1_latest?select=${CAL_COLS}&symbol=in.(${symList})&limit=200`,{headers:H}),
    fetch(`${SURL}/rest/v1/v_2h_guidance?select=${GUIDE_COLS}&symbol=in.(${symList})&limit=200`,{headers:H})
  ]);
  if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
  if(!calRes.ok){const body=await calRes.text().catch(()=>'');throw new Error(`calibrated: ${calRes.status} — ${body.slice(0,200)}`);}
  if(!guideRes.ok){const body=await guideRes.text().catch(()=>'');throw new Error(`guide: ${guideRes.status} — ${body.slice(0,200)}`);}
  const sizeData=await sizeRes.json();
  const calData=await calRes.json();
  const guideData=await guideRes.json();
  positionSizing={};
  sizeData.forEach(s=>{
    if(!s.symbol||s.symbol==='CASH'||s.symbol==='Cash')return;
    const entry={
      portfolio_pct:parseFloat(s.portfolio_pct)||0,
      effective_max_pct:parseFloat(s.effective_max_pct)||0,
      pct_of_max:parseFloat(s.pct_of_max)||0,
      value_gbp:parseFloat(s.value_gbp)||0
    };
    positionSizing[s.symbol]=entry;
    if(s.symbol==='BIT-XBTE')positionSizing['BTCUSD']=entry;
  });
  const gmap={};
  guideData.forEach(g=>{gmap[g.symbol]=g;});
  all=calData.map(r=>{
    const sym=r.symbol||stripPrefix(r.ticker);
    const g=gmap[sym]||{};
    const sz=positionSizing[sym]||{};
    return Object.assign({},r,sz,{
      symbol:sym,
      name:g.name||'',
      trend:g.trend!=null?parseFloat(g.trend):null,
      momentum:g.momentum!=null?parseFloat(g.momentum):null,
      state_name:g.state_name||null,
      state_changed:g.state_changed||false,
      state_direction:g.state_direction||null,
      rank_move:g.rank_move!=null?parseInt(g.rank_move):null,
      trend_d5:g.trend_d5!=null?parseFloat(g.trend_d5):null,
      trend_d10:g.trend_d10!=null?parseFloat(g.trend_d10):null,
      trend_d21:g.trend_d21!=null?parseFloat(g.trend_d21):null,
      perf_1d:g.perf_1d!=null?parseFloat(g.perf_1d):null,
      perf_5d:g.perf_5d!=null?parseFloat(g.perf_5d):null,
      perf_1m:g.perf_1m!=null?parseFloat(g.perf_1m):null,
      tier_sort:tierSortKey(r.tier)
    });
  });
}

function setView(v){
  view=v;
  document.getElementById('tabUniv').classList.toggle('on',v==='universe');
  document.getElementById('tabPos').classList.toggle('on',v==='positions');
  document.getElementById('tabPort').classList.toggle('on',v==='portfolio');
  document.getElementById('tabMacro').classList.toggle('on',v==='macro');
  document.getElementById('wltoggle').style.display='';
  document.getElementById('macroSubNav').style.display=v==='macro'?'':'none';
  if(v==='universe'||v==='positions'){
    document.getElementById('filterbar').style.display='';
    document.getElementById('wrap-main').style.display='';
    document.getElementById('wrap-portfolio').style.display='none';
    document.getElementById('wrap-macro').style.display='none';
  }else if(v==='portfolio'){
    document.getElementById('filterbar').style.display='none';
    document.getElementById('wrap-main').style.display='none';
    document.getElementById('wrap-portfolio').style.display='';
    document.getElementById('wrap-macro').style.display='none';
  }else if(v==='macro'){
    document.getElementById('wrap-portfolio').style.display='none';
  }
  grp='';state='';alertMode='';tier='';regstate='';volreg='';fpmin='';
  ['gsel','stsel','alsel','tiersel','regsel','volsel','fpsel'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  if(v==='portfolio'){
    loadPortfolio();
  }else if(v==='macro'){
    macroPreset='riskranges';
    setMacro('riskranges');
  }else{
    renderHeader();
    load();
  }
}

async function loadPortfolio(){
  const host=document.getElementById('portfolio-host');
  host.textContent='Loading…';
  try{
    const [perfRes,accRes,sizeRes,benchRes]=await Promise.all([
      fetch(`${SURL}/rest/v1/v_portfolio_performance?select=*`,{headers:H}),
      fetch(`${SURL}/rest/v1/positions?select=account,symbol,value_gbp`,{headers:H}),
      fetch(`${SURL}/rest/v1/v_positions_with_sizing?select=symbol,value_gbp,group_name,sub_group,portfolio_pct`,{headers:H}),
      fetch(`${SURL}/rest/v1/v_crossover_states?symbol=in.(SPX,NDX,RUT)&select=symbol,perf_1d,perf_5d,perf_1m,perf_3m`,{headers:H})
    ]);
    if(!perfRes.ok)throw new Error('performance: '+perfRes.status);
    if(!accRes.ok)throw new Error('accounts: '+accRes.status);
    if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
    const perf=await perfRes.json();
    const accRaw=await accRes.json();
    const sizeRaw=await sizeRes.json();
    const benchmarks=benchRes.ok?await benchRes.json():[];
    renderPortfolio(perf,accRaw,sizeRaw,benchmarks);
  }catch(e){
    host.innerHTML=`<div style="padding:40px 0;color:${R}">Error — ${e.message}</div>`;
  }
}

function gbp(v){if(v==null||isNaN(v))return '-';const n=Math.round(parseFloat(v));return'£'+n.toLocaleString('en-GB');}
function gbpSigned(v){if(v==null||isNaN(v))return '-';const n=Math.round(parseFloat(v));const col=n>0?G:n<0?R:W;return`<span style="color:${col}">${n>=0?'+':''}£${Math.abs(n).toLocaleString('en-GB')}</span>`;}
function pctSigned(v,d=2){if(v==null||isNaN(v))return '-';const n=parseFloat(v);const col=n>0?G:n<0?R:W;return`<span style="color:${col}">${n>=0?'+':''}${n.toFixed(d)}%</span>`;}

function renderPortfolio(perf,accRaw,sizeRaw,benchmarks){
  const host=document.getElementById('portfolio-host');
  const daily=perf.find(p=>p.period==='Daily')||{};
  const totalValue=parseFloat(daily.end_value)||0;
  const todayGain=parseFloat(daily.gain_value)||0;
  const todayPct=parseFloat(daily.gain_pct)||0;
  const todayCol=todayGain>=0?G:R;
  const summary=`<div class="summary-row"><div class="summary-item"><div class="lbl">Total Value</div><div class="val">${gbp(totalValue)}</div></div><div class="summary-item"><div class="lbl">Today</div><div class="val" style="color:${todayCol}">${todayGain>=0?'+':''}${gbp(Math.abs(todayGain))} (${todayPct>=0?'+':''}${todayPct.toFixed(2)}%)</div></div></div>`;
  const periods=['Daily','WoW','MTD','QTD','YTD','All Time'];
  let perfRows='';
  periods.forEach(p=>{
    const d=perf.find(x=>x.period===p)||{};
    const gv=parseFloat(d.gain_value)||0;
    const gp=parseFloat(d.gain_pct)||0;
    const cf=parseFloat(d.net_cash_flow)||0;
    const rg=parseFloat(d.real_gain)||0;
    const rp=parseFloat(d.real_gain_pct)||0;
    const hasCf=Math.abs(cf)>1;
    perfRows+=`<tr><td>${p}</td><td class="n">${gbpSigned(gv)}</td><td class="n">${pctSigned(gp)}</td><td class="n">${hasCf?gbpSigned(cf):'-'}</td><td class="n">${hasCf?gbpSigned(rg):'-'}</td><td class="n">${hasCf?pctSigned(rp):'-'}</td></tr>`;
  });
  const perfSec=`<div class="psec"><div class="psec-title">Performance</div><table class="pt"><thead><tr><th>Period</th><th class="n">Gain £</th><th class="n">Gain %</th><th class="n">Cash Flow</th><th class="n">Real Gain £</th><th class="n">Real %</th></tr></thead><tbody>${perfRows}</tbody></table></div>`;
  const portPerf={'1d':parseFloat((perf.find(p=>p.period==='Daily')||{}).gain_pct)||0,'5d':parseFloat((perf.find(p=>p.period==='WoW')||{}).gain_pct)||0,'1m':parseFloat((perf.find(p=>p.period==='MTD')||{}).gain_pct)||0};
  const benchOrder=['SPX','NDX','RUT'];
  const benchNames={'SPX':'S&P 500','NDX':'NASDAQ','RUT':'Russell 2000'};
  let benchRows=`<tr><td>Portfolio</td><td class="n">${pctSigned(portPerf['1d'])}</td><td class="n">${pctSigned(portPerf['5d'])}</td><td class="n">${pctSigned(portPerf['1m'])}</td><td class="n">-</td></tr>`;
  benchOrder.forEach(sym=>{
    const b=benchmarks.find(x=>x.symbol===sym);
    if(b)benchRows+=`<tr><td>${benchNames[sym]}</td><td class="n">${pctSigned(b.perf_1d)}</td><td class="n">${pctSigned(b.perf_5d)}</td><td class="n">${pctSigned(b.perf_1m)}</td><td class="n">${pctSigned(b.perf_3m)}</td></tr>`;
  });
  const benchSec=`<div class="psec"><div class="psec-title">vs US Indices</div><table class="pt"><thead><tr><th></th><th class="n">1D</th><th class="n">5D</th><th class="n">1M</th><th class="n">3M</th></tr></thead><tbody>${benchRows}</tbody></table></div>`;
  const accounts={};
  let totalCash=0,totalVal=0;
  accRaw.forEach(p=>{
    if(!accounts[p.account])accounts[p.account]={value:0,cash:0};
    const v=parseFloat(p.value_gbp)||0;
    accounts[p.account].value+=v;
    totalVal+=v;
    if(p.symbol==='CASH'||p.symbol==='Cash'){accounts[p.account].cash+=v;totalCash+=v;}
  });
  const accOrder=['Si SIPP','Si SIPP II','Si ISA','Wife ISA'];
  const accSorted=Object.entries(accounts).sort((a,b)=>{
    const ai=accOrder.indexOf(a[0]),bi=accOrder.indexOf(b[0]);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return -1;
    if(bi>=0)return 1;
    return b[1].value-a[1].value;
  });
  let accRows='';
  accSorted.forEach(([name,d])=>{
    const cashPct=d.value>0?(d.cash/d.value*100):0;
    accRows+=`<tr><td>${name}</td><td class="n">${gbp(d.value)}</td><td class="n">${gbp(d.cash)}</td><td class="n">${cashPct.toFixed(1)}%</td></tr>`;
  });
  const totalCashPct=totalVal>0?(totalCash/totalVal*100):0;
  accRows+=`<tr class="tot"><td>TOTAL</td><td class="n">${gbp(totalVal)}</td><td class="n">${gbp(totalCash)}</td><td class="n">${totalCashPct.toFixed(1)}%</td></tr>`;
  const accSec=`<div class="psec"><div class="psec-title">Accounts</div><table class="pt"><thead><tr><th>Account</th><th class="n">Value</th><th class="n">Cash</th><th class="n">Cash %</th></tr></thead><tbody>${accRows}</tbody></table></div>`;
  const groupStats={};
  let gTotalValue=0;
  const symbolTotals={};
  sizeRaw.forEach(p=>{
    if(!p.symbol||p.symbol==='CASH'||p.symbol==='Cash')return;
    const v=parseFloat(p.value_gbp)||0;
    const pc=parseFloat(p.portfolio_pct)||0;
    if(!symbolTotals[p.symbol])symbolTotals[p.symbol]={symbol:p.symbol,value:0,pct:0,group:p.group_name};
    symbolTotals[p.symbol].value+=v;
    symbolTotals[p.symbol].pct+=pc;
  });
  Object.values(symbolTotals).forEach(pos=>{
    const g=pos.group||'OTHER';
    if(!groupStats[g])groupStats[g]={count:0,value:0,positions:[]};
    groupStats[g].count++;
    groupStats[g].value+=pos.value;
    gTotalValue+=pos.value;
    groupStats[g].positions.push(pos);
  });
  const groupSorted=Object.entries(groupStats).sort((a,b)=>{
    if(a[0]==='CASH')return 1;
    if(b[0]==='CASH')return -1;
    return b[1].value-a[1].value;
  });
  let groupRows='';
  groupSorted.forEach(([name,d])=>{
    const allocPct=gTotalValue>0?(d.value/gTotalValue*100):0;
    d.positions.sort((a,b)=>b.value-a.value);
    const posText=d.positions.map(p=>`<span style="margin-right:18px;white-space:nowrap"><span style="color:${W}">${p.symbol}</span> <span style="color:rgba(255,255,255,0.55)">${p.pct.toFixed(1)}%</span></span>`).join('');
    groupRows+=`<tr><td>${name}</td><td class="n">${d.count}</td><td class="n">${allocPct.toFixed(1)}%</td><td class="n">${gbp(d.value)}</td><td style="padding-left:32px;font-size:11px">${posText||'-'}</td></tr>`;
  });
  const groupSec=`<div class="psec"><div class="psec-title">By Group</div><table class="pt"><thead><tr><th>Group</th><th class="n">#</th><th class="n">Alloc%</th><th class="n">Value</th><th style="padding-left:32px">Positions</th></tr></thead><tbody>${groupRows}</tbody></table></div>`;
  host.innerHTML=summary+perfSec+benchSec+accSec+groupSec;
}

function rrTrendColor(t){if(!t)return W;const u=t.toUpperCase();if(u==='BULLISH')return G;if(u==='BEARISH')return R;return W;}
function rrFormatPrice(v){if(v==null||isNaN(v))return dash;const n=parseFloat(v);if(n>=1000)return n.toLocaleString('en-US',{maximumFractionDigits:0});if(n<10)return n.toFixed(4);return n.toFixed(2);}
function rrPosCell(pct){if(pct==null||isNaN(pct))return dash;const n=parseFloat(pct);const r=Math.round(n);let col=W;if(n>100)col=R;else if(n>=75)col=R;else if(n<0)col=G;else if(n<=25)col=G;return`<span style="color:${col}">${r}%</span>`;}
function rrChgCell(v){if(v==null||isNaN(v))return dash;const n=parseFloat(v);const col=n>0?G:n<0?R:W;return`<span style="color:${col}">${n>=0?'+':''}${n.toFixed(2)}%</span>`;}
const GROUP_ORDER={'BONDS':1,'US INDICES':2,'US SECTORS':3,'COUNTRIES':4,'VOLATILITY':5,'CURRENCIES':6,'ENERGY':7,'COMMODITIES':8,'GOLD':9,'PRECIOUS METALS':10,'STOCKS':11,'CRYPTO':12,'MINERS':13,'GLOBAL FACTORS':14,'OTHER':99};

function numGrad(v){if(v==null||isNaN(v))return dash;const n=parseFloat(v);const col=n>0?G:n<0?R:W;const sign=n>0?'+':'';return`<span style="color:${col}">${sign}${n.toFixed(1)}</span>`;}
const MACRO_STATE_STYLE={'BULL ACCEL':{col:G,bold:600},'BULL ESTAB':{col:G,bold:600},'BULL FADING':{col:R,bold:400},'EARLY RECV':{col:W,bold:400},'BEAR DECEL':{col:R,bold:400},'BEAR ACCEL':{col:R,bold:600}};
function macroStateCell(s){if(!s)return dash;const st=MACRO_STATE_STYLE[s]||{col:W,bold:400};return`<span style="color:${st.col};font-weight:${st.bold}">${s}</span>`;}

async function loadMacroSectors(){

function renderMacroSectors(data){
  data.sort((a,b)=>(parseFloat(b.avg_trend)||0)-(parseFloat(a.avg_trend)||0));
  const rows=data.map(d=>{
    const t=parseFloat(d.avg_trend)||0;
    const m=parseFloat(d.avg_momentum)||0;
    const p1=parseFloat(d.avg_1d_pct)||0;
    const p5=parseFloat(d.avg_5d_pct)||0;
    const br=parseFloat(d.breadth)||0;
    const col1=p1>0?G:p1<0?R:W;
    const col5=p5>0?G:p5<0?R:W;
    return`<tr><td><span style="color:${W};font-weight:600">${d.group_name||''}</span></td><td><span style="color:${W}">${d.ticker_count||0}</span></td><td class="gsep-lg">${numGrad(t)}</td><td class="gend">${numGrad(m)}</td><td class="gsep gend">${macroStateCell(d.state_name)}</td><td class="gsep"><span style="color:${col1}">${p1>=0?'+':''}${p1.toFixed(2)}%</span></td><td class="gend"><span style="color:${col5}">${p5>=0?'+':''}${p5.toFixed(2)}%</span></td><td class="gsep"><span style="color:${W}">${br.toFixed(0)}%</span></td></tr>`;
  }).join('');
  const html=`<table><thead><tr class="gh"><th class="blank" colspan="2"></th><th colspan="2" class="gsep-lg gend">Position</th><th colspan="1" class="gsep gend">State</th><th colspan="2" class="gsep gend">Recent</th><th colspan="1" class="gsep">Breadth</th></tr><tr class="ch"><th style="min-width:160px;padding-left:16px">Sector</th><th style="min-width:48px">#</th><th class="gsep-lg" style="min-width:56px">Trend</th><th class="gend" style="min-width:56px">Mom</th><th class="gsep gend" style="min-width:120px">State</th><th class="gsep" style="min-width:70px">1D%</th><th class="gend" style="min-width:70px">5D%</th><th class="gsep" style="min-width:70px">Breadth</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('macro-host').innerHTML=html;
}

function renderHeader(){
  const h=document.getElementById('th-host');
  const sizeGroup=view==='positions'?' <th colspan="4" class="gsep-lg gend">Size</th>':'';
  const sizeCols=view==='positions'?
    ' <th class="gsep-lg tip" style="min-width:58px" onclick="sb(\'portfolio_pct\')" data-tip="Port% — current portfolio weight for this ticker across all accounts.">Port%</th>'+
    ' <th class="tip" style="min-width:58px" onclick="sb(\'effective_max_pct\')" data-tip="Max% — volatility-adjusted maximum position size for this ticker.">Max%</th>'+
    ' <th class="tip" style="min-width:58px" onclick="sb(\'pct_of_max\')" data-tip="% of Max — current size as a percentage of the maximum.\nBelow 50%: room to add.\n50 to 90%: appropriately sized.\n90 to 100%: near capacity.\nAbove 100%: over-sized.">%Max</th>'+
    ' <th class="tip gend" style="min-width:80px" onclick="sb(\'value_gbp\')" data-tip="Value — current GBP value of this position across all accounts.">Value</th>':'';
  const ghead=view==='positions'
    ?`<tr class="gh"><th class="blank" colspan="2"></th>${sizeGroup}<th colspan="2" class="gsep-lg gend">Context</th><th colspan="2" class="gsep gend">Trend / Trade</th><th colspan="3" class="gsep gend">Framework</th><th colspan="3" class="gsep gend">Velocity</th><th colspan="3" class="gsep gend">Z-Scores</th><th colspan="3" class="gsep gend">Slopes</th><th colspan="4" class="gsep gend">Fingerprints</th><th colspan="3" class="gsep gend">Recent</th><th colspan="1" class="gsep">Vol</th></tr>`
    :`<tr class="gh"><th class="blank" colspan="2"></th><th colspan="2" class="gsep-lg gend">Context</th><th colspan="2" class="gsep gend">Trend / Trade</th><th colspan="3" class="gsep gend">Framework</th><th colspan="3" class="gsep gend">Velocity</th><th colspan="3" class="gsep gend">Z-Scores</th><th colspan="3" class="gsep gend">Slopes</th><th colspan="4" class="gsep gend">Fingerprints</th><th colspan="3" class="gsep gend">Recent</th><th colspan="1" class="gsep">Vol</th></tr>`;
  const chead=`<tr class="ch">`+
    ` <th style="min-width:70px;padding-left:16px" onclick="sb('symbol')">Ticker</th>`+
    ` <th style="min-width:80px;max-width:100px" onclick="sb('group_name')">Group</th>`+
    `${sizeCols}`+
    // Context: State, Mv
    ` <th class="gsep-lg tip" style="min-width:110px" onclick="sb('state_name')" data-tip="State — combined regime classification using Trend and Momentum from the 2H ensemble system.\n\nBULL ACCEL: both Trend and Momentum strong, Momentum leading Trend.\nBULL ESTAB: both above +8, established uptrend.\nBULL FADING: Trend up but Momentum slipping below it.\nEARLY RECV: Trend still negative but Momentum recovering.\nBEAR DECEL: bearish but slowing.\nBEAR ACCEL: outright bearish with Momentum leading down.\n\nA green NEW marker means the state changed to a stronger one today. A red NEW means it weakened.">State</th>`+
    ` <th class="tip gend" style="min-width:48px;text-align:right!important" onclick="sb('rank_move')" data-tip="Mv — change in alignment rank versus yesterday.\n\nPositive: this ticker has climbed in the universe rank, other tickers fell behind it.\nNegative: this ticker has fallen in the rank.\n\nUseful as a relative-strength snapshot.">Mv</th>`+
    // Trend / Trade
    ` <th class="gsep tip" style="min-width:52px;text-align:right!important" onclick="sb('trend')" data-tip="Trend — 2H ensemble trend score on a -100 to +100 scale.\n\nAbove +50: strong uptrend.\n+8 to +50: uptrend.\n-8 to +8: neutral.\n-8 to -50: downtrend.\nBelow -50: strong downtrend.\n\nThe slower of the two ensemble scores. Anchors the regime read.">Trend</th>`+
    ` <th class="tip gend" style="min-width:52px;text-align:right!important" onclick="sb('momentum')" data-tip="Trade — 2H ensemble momentum score on a -100 to +100 scale.\n\nFaster than Trend. Often crosses zero earlier.\n\nWhen Trade is above Trend the regime is gaining strength.\nWhen Trade is below Trend the regime is fading.\n\nThe difference between Trend and Trade is itself a velocity signal.">Trade</th>`+
    // Framework: Tier, RegState, fp#
    ` <th class="gsep tip" style="min-width:110px" onclick="sb('tier_sort')" data-tip="Tier — calibrated action label combining regression position, behavioural fingerprints and trend velocity.\n\nBUY STRONG: pullback in trend with 2+ fingerprints firing, or oversold with 3+ fingerprints. Highest conviction long.\n\nBUY: pullback in trend alone or with 1 fingerprint. Solid conviction long.\n\nRECOVERY+: trend score rising fast across short and medium windows with at least 1 fingerprint firing. Early bottom turn with confirmation.\n\nRECOVERY: trend score rising fast across short and medium windows. Early bottom turn without behavioural confirmation.\n\nTRAP: oversold without fingerprint confirmation. Looks tempting but historically a falling knife.\n\nTRIM: 2 fingerprints firing on an extended position. Anti-signal for held positions.\n\nEXHAUSTION: trend rising fast with 3+ fingerprints firing. Late-stage rally with extreme confirmation; expect reversal.\n\nWAIT: 3+ fingerprints on extended position. Unstable, lottery dynamics.\n\nBlank: no actionable framework signal.">Tier</th>`+
    ` <th class="tip" style="min-width:140px" onclick="sb('reg_state')" data-tip="RegState — where the current price sits relative to its 63-bar regression line.\n\nPULLBACK IN TREND: trend rising strongly with price pulled well below the trend line. Primary buy zone.\n\nOVERSOLD: price more than 2 standard deviations below the trend line. Looks oversold but may be a falling knife if no other confirmation.\n\nNEUTRAL: price within 2 standard deviations of the trend line. Most common state.\n\nEXTENDED: price 2 to 3 standard deviations above the trend line. Stretched, caution zone.\n\nEXTREME TOP: price more than 3 standard deviations above the trend line. Very stretched.">RegState</th>`+
    ` <th class="tip gend" style="min-width:38px;text-align:right!important" onclick="sb('fp_count')" data-tip="fp# — number of behavioural fingerprints currently firing (0 to 4).\n\nEach fingerprint compares the ticker's current state to its own historical distribution. Higher count means more dimensions are simultaneously unusual.\n\n0: behaving normally for itself.\n1: one dimension is unusual.\n2: two dimensions unusual.\n3 or 4: highly anomalous behaviour for this ticker.">fp#</th>`+
    // Velocity: T.5D, T.10D, T.21D
    ` <th class="gsep tip" style="min-width:54px;text-align:right!important" onclick="sb('trend_d5')" data-tip="T.5D — change in the Trend score over the last 5 bars.\n\nThe fastest velocity signal. First to turn when the regime is shifting.\n\nPositive: Trend score is rising over the past 5 bars.\nNegative: Trend score is falling over the past 5 bars.\n\nUse as a read of what's happening RIGHT NOW. Not a trigger on its own — too noisy to act on alone.">T.5D</th>`+
    ` <th class="tip" style="min-width:54px;text-align:right!important" onclick="sb('trend_d10')" data-tip="T.10D — change in the Trend score over the last 10 bars.\n\nMedium velocity signal. Bridges short-term noise and long-term trend.\n\nPositive: Trend score rising over the past 10 bars.\nNegative: Trend score falling over the past 10 bars.\n\nWhen T.5D AND T.10D agree, the velocity signal has confirmation across two windows.">T.10D</th>`+
    ` <th class="tip gend" style="min-width:54px;text-align:right!important" onclick="sb('trend_d21')" data-tip="T.21D — change in the Trend score over the last 21 bars.\n\nSlowest velocity signal. Most reliable but lags the others.\n\nPositive: Trend score has improved over the past month.\nNegative: Trend score has deteriorated over the past month.\n\nWhen all three (T.5D, T.10D, T.21D) align, the regime is moving consistently in that direction across all horizons.">T.21D</th>`+
    // Z-Scores
    ` <th class="gsep tip" style="min-width:50px;text-align:right!important" onclick="sb('z_21')" data-tip="z21 — how far the current price sits above or below the 21-bar trend line, measured in standard deviations.\n\nA straight line drawn through the last 21 days of price action is the short-term trend. z21 measures the current gap between price and that line.\n\nBelow -2: price has pulled well below the short-term trend.\nBetween -2 and +2: normal range.\nAbove +2: stretched above the short-term trend.">z21</th>`+
    ` <th class="tip" style="min-width:50px;text-align:right!important" onclick="sb('z_63')" data-tip="z63 — how far the current price sits above or below the 63-bar trend line. The primary position measurement.\n\nDrives the RegState classification.\n\nBelow -2: oversold. Primary pullback zone in an uptrend.\n-2 to +2: neutral range.\n+2 to +3: extended above the trend line.\nAbove +3: extreme top.">z63</th>`+
    ` <th class="tip r gend" style="min-width:50px;text-align:right!important" onclick="sb('z_252')" data-tip="z252 — how far the current price sits above or below the 252-bar trend line.\n\nLong-term position context. Less actionable on its own, more useful for structural picture.\n\nBelow -2: price has pulled below long-term trend.\nAbove +2: price has stretched above long-term trend.">z252</th>`+
    // Slopes
    ` <th class="gsep tip r" style="min-width:55px;text-align:right!important" onclick="sb('slope_21')" data-tip="s21 — slope of the 21-bar regression line, expressed as annualised percent.\n\nPositive: price is rising at that annual rate.\nNegative: price is falling at that annual rate.\n\nShort-term trend direction. Often turns first when momentum shifts.">s21</th>`+
    ` <th class="tip r" style="min-width:55px;text-align:right!important" onclick="sb('slope_63')" data-tip="s63 — slope of the 63-bar regression line, expressed as annualised percent.\n\nThe key medium-term slope. Used with z63 to determine RegState.\n\n+10 to +50: trend persistence sweet spot.\nAbove +50: strong uptrend.\nNear zero: directionless.\nBelow -10: downtrend.">s63</th>`+
    ` <th class="tip r gend" style="min-width:55px;text-align:right!important" onclick="sb('slope_252')" data-tip="s252 — slope of the 252-bar regression line, expressed as annualised percent.\n\nLong-term structural trend direction.\n\nPositive: long-term uptrend intact.\nNegative: long-term downtrend.">s252</th>`+
    // Fingerprints
    ` <th class="gsep tip r" style="min-width:55px;text-align:right!important" onclick="sb('vol_z')" data-tip="vol_z — current 20-day close-to-close volatility, expressed as standard deviations versus this ticker's own 252-day vol history.\n\nAbove +3: vol unusually high for this ticker. The vol fingerprint fires (cell shows in bold).\nBetween -3 and +3: vol within its normal range.\nBelow -3: vol unusually low.\n\nA per-ticker measurement: every ticker has its own baseline.">vol_z</th>`+
    ` <th class="tip r" style="min-width:60px;text-align:right!important" onclick="sb('range_z')" data-tip="range_z — current 5-day average daily range, expressed as standard deviations versus this ticker's own range history.\n\nAbove +3: daily bars unusually wide for this ticker. The range fingerprint fires (cell shows in bold).\nBetween -3 and +3: range within normal.\nBelow -3: bars unusually narrow.\n\nCaptures intraday violence separately from close-to-close vol.">range_z</th>`+
    ` <th class="tip r" style="min-width:55px;text-align:right!important" onclick="sb('corr_z')" data-tip="corr_z — current 60-day correlation between this ticker and its group average, expressed as standard deviations versus its own correlation history.\n\nAbove +2: moves in lock-step with peers more than normal for this ticker.\nBelow -2: disconnected from peers compared to normal.\n\nThe corr fingerprint fires when the absolute value exceeds 2 either direction (cell shows in bold). Both extremes signal regime change.">corr_z</th>`+
    ` <th class="tip r gend" style="min-width:55px;text-align:right!important" onclick="sb('auto_z')" data-tip="auto_z — current 20-day return autocorrelation, expressed as standard deviations versus this ticker's own autocorrelation history.\n\nAbove +2: recent returns reinforcing each other more than normal. Strong trending rhythm. The auto fingerprint fires (cell shows in bold).\nBelow -2: returns alternating more than normal. Rhythm has collapsed.\n\nMeasures the day-to-day pattern of returns.">auto_z</th>`+
    // Recent
    ` <th class="gsep tip r" style="min-width:54px;text-align:right!important" onclick="sb('perf_1d')" data-tip="1D% — single-bar percentage return.\n\nToday's move versus yesterday's close.">1D%</th>`+
    ` <th class="tip r" style="min-width:54px;text-align:right!important" onclick="sb('perf_5d')" data-tip="5D% — cumulative percentage return over the last 5 bars.\n\nShort-window trajectory.">5D%</th>`+
    ` <th class="tip r gend" style="min-width:54px;text-align:right!important" onclick="sb('perf_1m')" data-tip="1M% — cumulative percentage return over the last approximately 21 bars.\n\nMonth-ish trajectory. Useful for context: has this already run, or is the move fresh?">1M%</th>`+
    // Vol Regime
    ` <th class="gsep tip r" style="min-width:75px" onclick="sb('vol_regime')" data-tip="VolReg — volatility environment based on percentile rank of current 20-day vol versus this ticker's own 252-day history.\n\nLOW: below 25th percentile. Calm conditions.\nNORM: 25th to 75th percentile. Typical conditions.\nHIGH: 75th to 95th percentile. Elevated, reduce sizing.\nEXTREME: above 95th percentile. Vol mean reversion zone.">VolReg</th>`+
    ` </tr>`;
  h.innerHTML=ghead+chead;
}

function toggleWL(){
  wl=(wl==='UK ETFS')?'MAIN':'UK ETFS';
  document.getElementById('wltoggle').textContent=(wl==='UK ETFS')?'UK':'US';
  load();
}
function setGrp(g){grp=g;af();}
function setState(s){state=s;af();}
function setAlert(a){alertMode=a;af();}
function setTier(t){tier=t;af();}
function setReg(r){regstate=r;af();}
function setVolReg(v){volreg=v;af();}
function setFp(f){fpmin=f;af();}

function titleCase(s){if(!s)return s;return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());}

function buildGroups(){
  const b=(view==='universe'&&wl)?all.filter(r=>r.watchlist===wl||r.watchlist==='BOTH'):all;
  const gs=[...new Set(b.map(r=>r.group_name).filter(Boolean))].sort();
  const sel=document.getElementById('gsel');
  const cur=sel.value;
  sel.innerHTML='<option value="">All Groups</option>'+gs.map(g=>`<option value="${g}"${g===cur?' selected':''}>${titleCase(g)}</option>`).join('');
  if(!gs.includes(grp)){sel.value='';grp='';}
}

function base(){
  return all.filter(r=>{
    if(view==='universe'&&wl&&r.watchlist!==wl&&r.watchlist!=='BOTH')return false;
    if(grp&&r.group_name!==grp)return false;
    if(state&&r.state_name!==state)return false;
    if(alertMode){
      const stateChanged=r.state_changed;
      const dir=r.state_direction;
      if(alertMode==='any'&&!stateChanged)return false;
      if(alertMode==='strengthening'&&!(stateChanged&&dir==='UP'))return false;
      if(alertMode==='weakening'&&!(stateChanged&&dir==='DOWN'))return false;
    }
    if(tier==='__ANY__' && !r.tier)return false;
    if(tier && tier!=='__ANY__' && r.tier!==tier)return false;
    if(regstate && r.reg_state!==regstate)return false;
    if(volreg && r.vol_regime!==volreg)return false;
    if(fpmin && (r.fp_count||0) < parseInt(fpmin))return false;
    return true;
  });
}

function af(){
  const s=document.getElementById('sr').value.toLowerCase();
  let b=base().filter(r=>{
    if(s&&!(r.symbol||'').toLowerCase().includes(s)&&!(r.name||'').toLowerCase().includes(s)&&!(r.group_name||'').toLowerCase().includes(s))return false;
    return true;
  });
  filt=b;
  sort();render();
}

function sb(c){
  if(sc===c)sd*=-1;
  else{sc=c;sd=c==='rank_move'||c==='tier_sort'?1:-1;}
  document.querySelectorAll('tr.ch th').forEach(t=>t.classList.remove('s'));
  event?.target?.classList.add('s');
  sort();render();
}

function sort(){
  filt.sort((a,b)=>{
    let av=a[sc],bv=b[sc];
    if(av==null)av=sd>0?Infinity:-Infinity;
    if(bv==null)bv=sd>0?Infinity:-Infinity;
    let primary;
    if(typeof av==='string')primary=av.localeCompare(bv)*sd;
    else primary=(av-bv)*sd;
    // Tier-sort tiebreakers:
    //   For actionable tiers (tier_sort < 99): fp_count desc, then trend desc.
    //     (fp_count adds conviction info within green/red tiers.)
    //   For blank tier (tier_sort = 99): trend desc only.
    //     (fp_count alone doesn't add edge in blank tier — just trend matters.)
    if(primary===0 && sc==='tier_sort'){
      const tierVal=a.tier_sort||99;
      const tA=a.trend==null?-999:parseFloat(a.trend);
      const tB=b.trend==null?-999:parseFloat(b.trend);
      if(tierVal<99){
        // Actionable tier: fp_count desc, then trend desc
        const fpA=a.fp_count==null?-1:parseInt(a.fp_count);
        const fpB=b.fp_count==null?-1:parseInt(b.fp_count);
        if(fpA!==fpB)return fpB-fpA;
        if(tA!==tB)return tB-tA;
      }else{
        // Blank tier: trend desc only
        if(tA!==tB)return tB-tA;
      }
    }
    return primary;
  });
}

const dash=`<span style="color:${W}">—</span>`;

const numSigned=(v,d=1)=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>0?G:f<0?R:W;
  return`<span style="color:${col}">${f.toFixed(d)}</span>`;
};

const pct=(v,d=1)=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>0?G:f<0?R:W;
  return`<span style="color:${col}">${f>=0?'+':''}${f.toFixed(d)}%</span>`;
};

const rmv=v=>{
  if(v==null||v===''||v===undefined)return dash;
  const i=parseInt(v);
  if(isNaN(i)||i===0)return dash;
  return`<span style="color:${i>0?G:R}">${i>0?'+':''}${i}</span>`;
};

const slopeCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>5?G:f<-5?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(1)}%</span>`;
};

const zCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f<-1?G:f>1?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(2)}</span>`;
};

// Fingerprint z: white (raw measurement, meaning depends on combination)
const fpZCell=(v,kind)=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  let firing=false;
  if(kind==='vol_z'||kind==='range_z')firing=f>3;
  else if(kind==='corr_z')firing=Math.abs(f)>2;
  else if(kind==='auto_z')firing=f>2;
  const weight=firing?'bold':'normal';
  return`<span style="color:${W};font-weight:${weight}">${f>0?'+':''}${f.toFixed(2)}</span>`;
};

const stateCell=v=>{
  if(!v)return dash;
  let col=W;
  if(v==='BULL ACCEL'||v==='BULL ESTAB')col=G;
  else if(v==='BEAR DECEL'||v==='BEAR ACCEL')col=R;
  return`<span style="color:${col}">${v}</span>`;
};

const tierCell=t=>{
  if(!t)return dash;
  let col=W;
  if(t==='BUY STRONG'||t==='BUY'||t==='RECOVERY+'||t==='RECOVERY')col=G;
  else if(t==='TRAP'||t==='TRIM'||t==='EXHAUSTION')col=R;
  return`<span style="color:${col};font-weight:600">${t}</span>`;
};

// RegState: white (descriptive position, no inherent action)
const regStateCell=s=>{
  if(!s)return dash;
  return`<span style="color:${W}">${s}</span>`;
};

const volRegCell=v=>{
  if(!v)return dash;
  let col=W;let weight=400;
  if(v==='EXTREME'){col=G;weight=600;}
  else if(v==='HIGH')col=R;
  return`<span style="color:${col};font-weight:${weight}">${v}</span>`;
};

// fp count: white (count alone has no inherent action)
const fpCountCell=c=>{
  if(c==null)return dash;
  const n=parseInt(c);
  return`<span style="color:${W}">${n}</span>`;
};

// Trend velocity: change in Trend score. Green if >+1, red if <-1, white otherwise (small changes are noise)
const tvCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>1?G:f<-1?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(1)}</span>`;
};

const portPctCell=v=>{if(v==null||isNaN(v))return dash;return`<span style="color:${W}">${parseFloat(v).toFixed(1)}%</span>`;};
const maxPctCell=v=>{if(v==null||isNaN(v))return dash;return`<span style="color:${W}">${parseFloat(v).toFixed(1)}%</span>`;};
const pctMaxCell=v=>{if(v==null||isNaN(v))return dash;const f=parseFloat(v);const col=f>100?R:W;return`<span style="color:${col}">${Math.round(f)}%</span>`;};
const valueCell=v=>{if(v==null||isNaN(v))return dash;const f=Math.round(parseFloat(v));return`<span style="color:${W}">£${f.toLocaleString('en-GB')}</span>`;};

function render(){
  const tb=document.getElementById('tb');
  if(!filt.length){tb.innerHTML='<tr><td colspan="25" class="msg">No results</td></tr>';return;}
  const showSize=view==='positions';
  tb.innerHTML=filt.map(r=>{

    const sizeCells=showSize?

      `<td>${maxPctCell(r.effective_max_pct)}</td>`+
      `<td>${pctMaxCell(r.pct_of_max)}</td>`+
      `<td class="gend">${valueCell(r.value_gbp)}</td>`
      :'';
    return`<tr>`+
      tickerCell+
      `<td><span style="color:${W};max-width:100px;overflow:hidden;text-overflow:ellipsis;display:block;white-space:nowrap;font-size:11px">${r.group_name||''}</span></td>`+

      `<td class="gsep-lg">${stateCell(r.state_name)}${r.state_changed?newCell(r.state_direction):''}</td>`+

      `<td>${regStateCell(r.reg_state)}</td>`+

      `<td class="gsep" style="text-align:right">${tvCell(r.trend_d5)}</td>`+
      `<td style="text-align:right">${tvCell(r.trend_d10)}</td>`+
      `<td class="gend" style="text-align:right">${tvCell(r.trend_d21)}</td>`+
      `<td class="gsep" style="text-align:right">${zCell(r.z_21)}</td>`+
      `<td style="text-align:right">${zCell(r.z_63)}</td>`+
      `<td class="gend" style="text-align:right">${zCell(r.z_252)}</td>`+
      `<td class="gsep" style="text-align:right">${slopeCell(r.slope_21)}</td>`+
      `<td style="text-align:right">${slopeCell(r.slope_63)}</td>`+
      `<td class="gend" style="text-align:right">${slopeCell(r.slope_252)}</td>`+
      `<td class="gsep" style="text-align:right">${fpZCell(r.vol_z,'vol_z')}</td>`+
      `<td style="text-align:right">${fpZCell(r.range_z,'range_z')}</td>`+
      `<td style="text-align:right">${fpZCell(r.corr_z,'corr_z')}</td>`+
      `<td class="gend" style="text-align:right">${fpZCell(r.auto_z,'auto_z')}</td>`+
      `<td class="gsep" style="text-align:right">${pct(r.perf_1d)}</td>`+
      `<td style="text-align:right">${pct(r.perf_5d)}</td>`+
      `<td class="gend" style="text-align:right">${pct(r.perf_1m)}</td>`+
      `<td class="gsep">${volRegCell(r.vol_regime)}</td>`+
      `</tr>`;
  }).join('');
}

const BUILTIN_SPEC=`════════════════════════════════════════════════════════════════════
2H v3.1 SPECIFICATION
════════════════════════════════════════════════════════════════════

This dashboard sits alongside the main 2H dashboard. It uses the same
data infrastructure but with a different column set focused on
validated entry signals and anti-signals. The main 2H dashboard
remains your primary daily workflow tool.

This spec has two parts:

  PART A — TRADING GUIDE: how to use the framework day-to-day.
  PART B — INFRASTRUCTURE: how the data and views are built.


════════════════════════════════════════════════════════════════════
PART A — TRADING GUIDE
════════════════════════════════════════════════════════════════════


A1. THE THREE DIMENSIONS
========================

Every entry signal in the framework comes from one or more of three
independent dimensions. Each measures something different.

DIMENSION 1: REGRESSION POSITION
  Where the current price sits relative to its 63-bar trend line.
  Look at: z63, s63, RegState.

  z63 = standard deviations from the trend line.
    Below -2: oversold (unusually below).
    -2 to 0: pullback territory.
    Around 0: on the trend line.
    0 to +2: above trend, normal.
    +2 to +3: stretched (extended).
    Above +3: extreme top.

  s63 = annualised slope of the trend line.
    Above +10: meaningful uptrend, supports pullback buys.
    0 to +10: weak uptrend.
    Below 0: downtrend.
    Below -10: meaningful downtrend.

  Reading them together:
    z63=-2.3 with s63=+18 means price has pulled back substantially
      within a strong uptrend. Classic buy setup geometry.
    z63=-2.3 with s63=-5 means oversold within a downtrend. Looks
      oversold but trend doesn't support reversion. Anti-signal.
    z63=+2.5 with s63=+20 means stretched above a strong uptrend.
      Extension warning, not necessarily an exit.

DIMENSION 2: BEHAVIOURAL FINGERPRINTS
  Whether the ticker is behaving normally for itself.
  Look at: vol_z, range_z, corr_z, auto_z, fp count.

  WHAT THEY ARE
  A behavioural fingerprint is a single dimension of the ticker's trading
  character. Volatility, daily range, peer correlation, and return rhythm
  are each measured against that ticker's own 252-day history (with 21-day
  lag, so no look-ahead bias). Each fingerprint "fires" when the current
  reading sits at the extreme of the ticker's own distribution.

  WHY THESE FOUR
  We tested twelve-plus candidate fingerprint dimensions during framework
  validation. Only these four showed measurable independent edge when
  combined with regression position. The others (volume deviation, gap
  patterns, wick shapes, close-position-in-bar, asymmetric returns) either
  showed no edge or duplicated information already in these four.

  WHAT EACH MEASURES
  vol_z    20-day close-to-close volatility versus own history.
           Fires above +3. Catches when daily moves get unusually big.
  range_z  5-day average daily range versus own history.
           Fires above +3. Catches when bars get unusually wide
           (different from vol — captures intraday violence).
  corr_z   60-day correlation to group average versus own correlation
           history. Fires when |z| > 2 (both extremes matter).
           Catches when a ticker either locks in with peers or breaks
           away from them — both are regime-change signals.
  auto_z   20-day return autocorrelation versus own history.
           Fires above +2. Catches when day-to-day return rhythm
           gets unusually strong (trending streak forming).

  WHY PER-TICKER NORMALISATION
  Each fingerprint normalises to the ticker's OWN distribution, not the
  market's. A vol_z of +3 on a sleepy bond ETF means something
  qualitatively different from vol_z +3 on a high-beta growth name —
  but the framework treats them equally: both are "this asset behaving
  unusually for itself."

  HOW THEY COMBINE — FP COUNT
  Each fingerprint independently fires or doesn't. The count is just the
  sum (0 to 4). A higher count means more dimensions are simultaneously
  anomalous — increasing the probability that a real regime shift is
  underway rather than just one noisy measurement.

  fp count reading:
    0: behaving normally for itself.
    1: one dimension anomalous, slight signal.
    2: two dimensions anomalous, confirmed unusual behaviour.
    3 or 4: highly anomalous.

  KEY INSIGHT: NO DIRECTION
  Fingerprints alone don't tell you direction. They tell you "something
  unusual is happening." Direction comes from regression.
    3+ fp on a deeply oversold ticker = capitulation = BUY signal.
    3+ fp on a stretched ticker      = exhaustion = SELL signal.

  This is WHY a ticker can show fp_count = 2 and still have NO TIER —
  the behavioural anomaly is real but the regression position doesn't
  give the framework directional conviction. See A2 for the full
  explanation of blank tiers.

DIMENSION 3: VELOCITY (TREND SCORE DELTAS)
  How fast the 2H Trend score is changing.
  Look at: T.5D, T.10D, T.21D.

  Each value is the difference between today's Trend score and the
  Trend score N bars ago. Positive = improving. Negative = deteriorating.

  Pattern readings:
    All three positive: regime accelerating, fully bullish velocity.
    T.5D+ T.10D+ T.21D-: recovery zone (FAST_UP, triggers RECOVERY).
    T.5D+ only: earliest stage of recovery, noisy.
    Mixed states: no clear pattern.
    T.5D- only: earliest deterioration, noisy.
    T.5D- T.10D- T.21D+: recent weakening despite longer strength.
    All three negative: regime fully decelerating.

  The most important pattern is FAST_UP. This is what RECOVERY tiers
  detect: short and medium have turned up but the longer window
  hasn't caught up yet.


A2. THE TIER SYSTEM
===================

Each tier validated against forward returns over a 26-month sample,
walk-forward validated by excluding Q2 2025.

BUY SIGNALS

  BUY STRONG    (green, bold)
    Pullback in trend with 2+ fingerprints, or oversold with 3+ fp.
    Validated: 80-86% hit at 21 days, +4.50 to +4.84% avg return.
    Highest conviction. Multiple dimensions confirming.
    Sample: 160-185 events.

  BUY    (green)
    Pullback in trend on its own or with 1 fingerprint firing.
    Validated: 71-72% hit at 21 days, +2.22 to +2.54% avg return.
    Solid standard entry. Most common buy signal.
    Sample: 2,971 events.

  RECOVERY+    (green)
    FAST_UP velocity pattern with 1+ fingerprint firing.
    Validated: 73.2% hit at 21 days, +5.24% avg return.
    Catches the inflection — velocity has turned but regression hasn't.
    Sample: 1,170 events.

  RECOVERY    (green)
    FAST_UP velocity pattern alone, no fingerprints.
    Validated: 63.7% hit at 21 days, +2.61% avg return.
    Lower conviction but large sample, moderate edge.
    Sample: 4,796 events.

AVOID SIGNALS

  TRAP    (red, bold)
    Oversold (z63 < -2) without fingerprint confirmation, not in
    strong uptrend.
    Validated: 42-48% hit at 21 days, -0.77 to -1.66% avg return.
    Falling-knife pattern. Looks oversold but no reason to reverse.
    Sample: 1,760 events combined.

  TRIM    (red)
    2 fingerprints firing on extended position (z63 between +2 and +3).
    Validated: 40% hit at 21 days, -0.73% avg return.
    Exit signal for held positions in this state.
    Sample: 151 events.

  EXHAUSTION    (red, bold)
    FAST_UP velocity with 3+ fingerprints firing.
    Validated: 36% hit at 21d, -5.06% avg return at 63 days.
    Late-stage rally with extreme behavioural confirmation.
    Sample: 25 events (small but consistent across periods).

  WAIT    (white)
    3+ fingerprints firing on extended position.
    Lottery dynamics, unstable. Skip.

NO SIGNAL

  Blank
    Most tickers most days. Framework has no opinion.
    Use other tools for these.


A2.1 WHY FINGERPRINTS ALONE DON'T TRIGGER A TIER
================================================

This is the most common comprehension gap, so it deserves explanation.

You will see tickers with fp_count = 2, 3, or even 4 that have BLANK tier.
That looks contradictory at first — "the fingerprints are firing, why no
signal?" — but it is intentional and important.

THE PRINCIPLE: FINGERPRINTS HAVE NO DIRECTION
A high fingerprint count tells you "this ticker is behaviourally unusual
right now." It does NOT tell you whether that unusual behaviour means
capitulation (bullish) or exhaustion (bearish). Direction comes from the
regression dimension (z63 + slope_63) or velocity dimension (FAST_UP).

THE VALIDATION MATRIX SAYS SO
Looking at the backtest, fp_count = 2 produced these forward-21-day
results across different regression positions:

  fp=2 + PULLBACK_IN_TREND  86.3% hit, +4.84% avg   → BUY STRONG fires
  fp=2 + OVERSOLD            54.2% hit, +0.80% avg   → no edge, no tier
  fp=2 + NEUTRAL             52.3% hit, +0.67% avg   → no edge, no tier
  fp=2 + EXTENDED            39.7% hit, -0.73% avg   → TRIM fires
  fp=2 + EXTREME_TOP         41.3% hit, +7.53% avg   → mixed, no tier

The framework only fires a tier where measured edge exists in either
direction. Two fingerprints firing on a NEUTRAL position is essentially
baseline — no measured directional edge. The framework honestly says
"blank" rather than inventing a label.

WHAT BLANK TIER WITH HIGH FP MEANS PRACTICALLY
The ticker is behaviourally anomalous. The framework cannot predict
direction from that anomaly alone. Three readings:

  1. The anomaly might be capitulation forming — watch the regression
     dimension closely. If z63 drops below -2 over the coming days
     AND slope_63 stays above +10, BUY STRONG will fire.
  2. The anomaly might be exhaustion forming — if z63 rises above +2,
     TRIM will fire next.
  3. The anomaly might be noise — in many cases the unusual behaviour
     passes without becoming a tradeable signal.

WHAT TO DO WITH BLANK + HIGH FP TICKERS
Add them to a watchlist. Check them daily. The framework will tell you
when the position dimension confirms direction. Until then, the
framework genuinely has no opinion — and pretending otherwise would
dilute the labels that DO carry measured edge.


A2.2 COMMON MULTI-DIMENSIONAL PATTERNS
======================================

Reading a row in the dashboard means combining columns. The tier label
doesn't tell the full story by itself. Here are the most common
multi-dimensional patterns worth recognising on sight.

Each pattern is described as "if you see X, the read is Y." None of
these are rules — they're recognitions that build with use.


PATTERN 1: HIGH-CONVICTION CAPITULATION BUY
  BUY STRONG tier + fp_count >= 3 + z63 below -2.5 + slope_63 above +15
  Reading: deepest pullback in confirmed uptrend with maximum
  behavioural confirmation. Historically 86%+ hit rate. Standard or
  above-standard sizing.

PATTERN 2: MODERATE BUY IN UPTREND
  BUY tier + 5D% below 5% + 1M% positive + z63 fresh (still negative)
  Reading: clean pullback entry. The signal hasn't already played out.
  Standard sizing.

PATTERN 3: LATE-CYCLE RECOVERY
  RECOVERY+ tier + z63 already above zero + 5D% above 5%
  Reading: the recovery has already started before the framework
  caught it. Lower remaining edge. Reduced sizing or skip.

PATTERN 4: HIDDEN DETERIORATION (no anti-signal but warning)
  Blank tier + State BULL FADING + Trade negative + velocity ALL_NEG
  + slope_63 still positive
  Reading: the ensemble is showing strain even though the regression
  geometry hasn't broken. Not a formal anti-signal. Worth reducing
  exposure or watching closely. If z63 drops below -2 with weak slope,
  TRAP will fire next.

PATTERN 5: EXTENSION WARNING
  Blank tier + fp_count = 2 + z63 between +2 and +3 + velocity ALL_POS
  Reading: framework's TRIM should be firing here. If it's not, check
  whether velocity pattern (T.5D + T.10D positive, T.21D negative) is
  required for TRIM in this position. Either way, this is exhaustion
  territory — take profits on held positions.

PATTERN 6: COUNTER-TREND BOUNCE (DANGEROUS)
  RECOVERY tier + State BEAR_ACCEL or slope_63 strongly negative
  Reading: velocity has flipped up briefly within a downtrend. The
  framework's RECOVERY validation includes both bull and bear-state
  cases — bear-state cases have lower hit rates than the average. Half
  size at most. Tight time exit (5-7 days).

PATTERN 7: HEALTHY CONSOLIDATION (not a breakdown)
  Blank tier + z63 near zero + slope_63 positive + 1M% positive +
  fp_count = 0
  Reading: ticker is sitting on its trend line in a confirmed uptrend
  with no behavioural anomaly. Recent momentum may have cooled but
  price geometry is intact. This is what "normal" looks like in an
  uptrend. Hold if held. No new entry signal.

PATTERN 8: EXHAUSTION SETUP (genuine sell)
  Blank tier + ALL_POS velocity + fp_count >= 2 + z63 above +1.5
  Reading: trend rally with behavioural extremes firing. The framework
  fires EXHAUSTION only when velocity is FAST_UP (T.21D negative). When
  T.21D is positive too, EXHAUSTION doesn't trigger but the geometric
  setup is similar. Treat as a pre-EXHAUSTION warning on held
  positions. Trim if over max.

PATTERN 9: ANOMALY WITHOUT DIRECTION
  Blank tier + fp_count >= 2 + z63 between -1 and +1
  Reading: ticker is behaviourally unusual but price isn't stretched
  in either direction. Direction will come — watch which way z63
  moves. Below -2 with slope support = potential BUY. Above +2 =
  potential TRIM. Until then, no action.

PATTERN 10: REGIME-OPPOSED RECOVERY (skip)
  RECOVERY+ or RECOVERY tier + group in macro-opposed sector
  (utilities/bonds/gold in Quad 2, etc.)
  Reading: framework fired the signal but macro context is unfavourable.
  Hit rate in regime-opposed contexts is lower than the validated
  average. Skip or quarter-size only.

PATTERN 11: STALE DATA WARNING
  Any tier + is_fresh = false
  Reading: data hasn't refreshed. Don't act on signal until data is
  current. Check the staleness, refresh if possible, otherwise treat
  the tier as unverified.

PATTERN 12: BREAKDOWN CONFIRMING (clear sell)
  TRAP tier + 1M% negative + slope_63 weak or negative
  Reading: framework anti-signal aligns with broad price weakness.
  Highest-confidence exit signal. If held, exit promptly.


A3. HOW TO ENTER — FIVE STEPS
=============================

STEP 1: Check the Tier
  Sort by Tier (default). Green tiers at top. Anything blank: ignore.
  
  Within each tier the default sort applies tiebreakers:
  
  Actionable tiers (BUY STRONG / BUY / RECOVERY+ / RECOVERY / TRAP /
  TRIM / EXHAUSTION / WAIT):
    1. fp_count descending — more anomalous within same tier
    2. Trend descending — stronger trend reading at same fp_count
  
  Blank tier:
    Trend descending only.
    fp_count is not used as a tiebreaker in blank tier because fp count
    alone does not add edge without position confirmation. Trend
    ordering is more useful for spotting candidates approaching a tier
    signal — healthy uptrend tickers appear at the top of the blank
    zone, downtrend tickers at the bottom.

STEP 2: Verify the setup is fresh
  Check 1D%, 5D%, 1M%, and z63.

  For BUY STRONG / BUY:
    z63 still < 0 (price still below trend line)
    5D% < 7% (move hasn't already happened)
    Signal hasn't been firing >2-3 trading days
    
  For RECOVERY+ / RECOVERY:
    z63 between -1 and +1 is normal (these fire as recovery happens)
    5D% < 10% (move not too advanced)
    Signal hasn't been firing >2-3 trading days

  If too mature, either skip or take a smaller position.

STEP 3: Check the broader context
  Look at State, s63, s252.

  Context boosts conviction:
    BUY/BUY STRONG + s63 positive + State bullish  → standard/larger
    BUY/BUY STRONG + s63 negative                  → lower conviction
    RECOVERY+ + State EARLY_RECV or BULL_FADING    → standard
    RECOVERY+ + State BEAR_DECEL                   → half sizing
    RECOVERY+ + State BEAR_ACCEL                   → most cautious

STEP 4: Check the macro
  Open the main 2H Macro tab. Quick read:
    Hedgeye risk ranges broadly bearish? Tighten filters.
    Broadly bullish? Standard treatment.
    Indices near sell levels? Entering late-cycle.
    Indices near buy levels? Fresh entries are working.

  The framework doesn't see macro. You do.

STEP 5: Verify sizing
  Switch to Positions tab. Check %Max for the ticker:
    Below 50%: room to add a full position
    50-90%: appropriately sized, smaller add
    90-100%: at capacity, don't add
    Above 100%: over-sized, should be trimming


A4. SIZING BY CONVICTION
========================

Match size to the tier's measured edge:

  BUY STRONG   Full position, can be slightly above normal
  BUY          Full standard position
  RECOVERY+    Standard position
  RECOVERY     Half to three-quarter position

Reduce by half in any of these cases:
  s63 negative
  State in bearish camp
  Broad market showing bearish risk ranges
  Recent 5D% > 10% (move already mature)


A5. MANAGING HELD POSITIONS
===========================

DAILY REVIEW (3 minutes)

Switch to Positions tab. Look at Tier for everything you hold:

  Blank tier                      No action. Normal hold zone.
  BUY STRONG/BUY still firing     Setup re-confirming. Hold or add.
  RECOVERY+/RECOVERY firing       Recovery still in progress. Hold.
  TRAP                            Anti-signal. Review for exit.
  TRIM                            Anti-signal. Consider reducing.
  EXHAUSTION                      Strong anti-signal. Reduce or exit.
  WAIT                            Unstable. Reduce or exit.

VELOCITY AS A POSITION-READING TOOL

For positions showing blank Tier, glance at velocity:

  All three green (T.5D, T.10D, T.21D positive)
    Position is healthy, doing what it should.
    
  T.5D+ T.10D+ T.21D-
    Position is in a recovery phase.
    
  T.5D- T.10D- T.21D+
    Recent deterioration but longer window still ok. Caution.
    
  All three red
    Multi-window weakening. Pay attention but no automatic action.

Important: velocity alone is NOT an exit signal. Data shows velocity
cracking has near-baseline forward returns. Don't exit just because
T.5D turned negative. Use it as context for your judgement.

VALIDATED EXIT TRIGGERS

  1. Anti-signal Tier fires (TRAP, TRIM, EXHAUSTION, WAIT) → review
  2. State flips down (NEW marker red, direction=DOWN) → review
  3. Multiple dimensions deteriorating together → strong signal
  4. Time horizon hit (see A6)


A6. EXIT TIMING BY ENTRY TIER
==============================

BUY STRONG entries
  Primary horizon: 63 days
  Most of +4.8% expected return materialises in 21-63 days
  Review at day 21 (if up substantially, partial profit possible)
  Full exit by day 63 if no anti-signal
  Profit target: +5-8% can trigger partial exit

BUY entries
  Primary horizon: 21-63 days
  +2.2-2.5% expected, slower to develop
  Review at day 30, full exit by day 63
  Profit target: +3-5% can trigger partial exit

RECOVERY+ entries
  Primary horizon: 21 days
  +5.2% expected return clusters in 5-15 day window
  Review at day 14, exit by day 21
  Profit target: +5% can trigger exit (expected move captured)
  Watch for transition to ALL_POS velocity (edge consumed)

RECOVERY entries
  Primary horizon: 21 days
  +2.6% expected, smaller move
  Review at day 14, exit by day 21
  Profit target: +3% can trigger exit
  Watch for transition to ALL_POS velocity

STOPS

The framework doesn't define stops — that's risk management,
separate from edge. Use whatever stop logic you already use:
  Percentage drawdown stop (e.g., 5-8% below entry)
  Volatility-based stop (e.g., 2x ATR)
  Structural stop (below recent pivot low)
  Time-based stop (out if not working by day 7)


A7. COMMON SCENARIOS
====================

SCENARIO: Multiple signals firing simultaneously
  Filter to your watchlist, then by group if needed.
  Take BUY STRONG first (highest edge).
  Then BUY on tickers not already held.
  Be selective on RECOVERY+/RECOVERY (lower edge per trade).

SCENARIO: Signal firing but ticker already up sharply today
  For BUY STRONG/BUY: check z63. Still negative? Take it.
  For RECOVERY+/RECOVERY: check 5D%. Below 7%? Take it.

SCENARIO: Held position morphs BUY STRONG → blank
  Normal. Entry signal extinguishes as mean reversion completes.
  If velocity is healthy and z63 has moved as expected, hold.
  Don't exit just because Tier went blank.

SCENARIO: TRAP firing on a ticker you were about to buy
  Skip. TRAP showed negative expected return.
  This is exactly what the framework is built to catch.

SCENARIO: RECOVERY+ in bearish ticker State
  Half sizing, tighter time exit.
  Treat as tactical bounce, not recovery hold.
  Watch for State improvement.

SCENARIO: Held position showing EXHAUSTION
  Most-validated exit anti-signal in the framework.
  36% hit at 21 days, -5.06% at 63 days.
  Reduce significantly or exit fully.


A8. DISCIPLINE RULES
====================

  1. Don't buy TRAPs. Even if everything else looks compelling.
  2. Don't enter on blank Tier. No measured edge.
  3. Size by conviction. BUY STRONG can be larger. RECOVERY smaller.
  4. Honour the exit horizons. 21 days for velocity tiers, 63 for
     regression tiers.
  5. Anti-signals on held positions get reviewed.
  6. Don't time velocity cracks. First T.5D negative isn't predictive.
  7. Macro context modifies sizing, not signals.
  8. Track 30-50 trades before refining anything.


A9. WHAT THE FRAMEWORK DOES NOT DO
==================================

  Doesn't tell you when to take profits before 21/63 day horizon
  Doesn't define stop-loss levels
  Doesn't account for macro context
  Doesn't know what you already hold
  Doesn't track relative strength across tickers
  Doesn't predict reversals in absence of anti-signals
  Doesn't replace your trading judgement


A10. FIRST MONTH APPROACH
=========================

  Week 1-2: Watch only. See how signals fire. Don't act.
  Week 3-4: Begin with BUY STRONG and TRAP signals. Small sizes.
  Week 5-8: Add BUY and RECOVERY+. Standard sizes.
  Month 3:  Review your log. Compare hit rates to validation.
            Refine only based on evidence, not speculation.

B2. SOURCE TABLES
=================

daily_ohlc
  Historical end-of-day OHLC data.
  Keyed on (ticker, trade_date).
  Ticker format: prefixed (e.g., AMEX:AMLP, LSE:VWRL).

two_h_readings
  Current-day intraday + recent EOD data.
  Keyed on (ticker, bar_date).
  Ticker format: bare (e.g., AMLP, VWRL).
  Note: ticker mismatch between these two tables is handled in joins
  via tickers_config and SPLIT_PART or concatenation.

tickers_config
  ticker         prefixed form (AMEX:AMLP)
  symbol         bare form (AMLP)

  Used to map between the two ticker formats throughout the system.

  symbol         bare ticker

  value_gbp      current GBP value


B3. COMPUTED VIEWS
==================

v_2h_pure_v3
  Linear regression on log-price over 21, 63, 252 bars.
  Outputs: slope_21, slope_63, slope_252 (annualised %)
           z_21, z_63, z_252 (standard deviations from regression)
           vol_annual_pct, vol_pct_rank
  Keyed on prefixed ticker.
  Refresh: 18:00 UTC weekdays.

v_fingerprints_v1 (NEW)
  Behavioural fingerprint z-scores per ticker per day.
  Each metric compared to the ticker's own 252-day distribution
  (with 21-day lag — no look-ahead bias).
  Outputs: vol_z   (20-day close-to-close vol)
           range_z (5-day average daily range)
           corr_z  (60-day correlation to group avg)
           auto_z  (20-day return autocorrelation)
  Keyed on prefixed ticker.
  Refresh: 18:01 UTC weekdays (after v_2h_pure_v3).

v_2h_calibrated_v1 (NEW)
  Combined classification view.
  Joins v_2h_pure_v3 (regression) + v_fingerprints_v1 (fingerprints)
       + v_2h_guidance (velocity).
  Derives:
    fp_count       count of fired fingerprints (0-4)
    vel_pattern    velocity classification (ALL_NEG, FAST_UP, etc.)
    reg_state      regression classification (PULLBACK IN TREND, etc.)
    tier           action label (BUY STRONG, BUY, etc.)
    vol_regime     LOW/NORM/HIGH/EXTREME from vol_pct_rank
  Keyed on prefixed ticker.
  Refresh: 18:02 UTC weekdays (after v_fingerprints_v1).

v_2h_calibrated_v1_latest
  Latest row per ticker from v_2h_calibrated_v1.
  Standard view (not materialised). Selected by dashboard.

v_2h_guidance (existing)
  2H ensemble + state + velocity + recent performance.
  Outputs include: trend, momentum, state_name, state_changed,
                  state_direction, rank_move,
                  trend_d5, trend_d10, trend_d21,
                  perf_1d, perf_5d, perf_1m.
  Keyed on bare symbol.
  Refresh: managed by existing 2H pipeline.


B4. MATERIALISED VIEW CHAIN
===========================

EOD chain (weekdays):
  17:30 UTC  UK market close
  18:00 UTC  v_2h_pure_v3 refresh
  18:01 UTC  v_fingerprints_v1 refresh
  18:02 UTC  v_2h_calibrated_v1 refresh
  21:30 UTC  US market close, additional refresh runs

All refreshes use CONCURRENTLY for non-blocking updates.
Concurrent refresh requires UNIQUE INDEX which exists on each.

Cron jobs in Supabase:
  refresh_v_2h_pure_v3            existing
  refresh_v_fingerprints_v1       added by this framework
  refresh_v_2h_calibrated_v1      added by this framework


B5. TIER LOGIC IMPLEMENTATION
=============================

Tier is computed inside v_2h_calibrated_v1 as a CASE expression.
Priority order matters — more restrictive conditions first:

  1. fp_count = 2 AND z_63 BETWEEN 2 AND 3
       → TRIM
  2. fp_count >= 3 AND z_63 > 2
       → WAIT
  3. fp_count <= 1 AND z_63 < -2 AND NOT (slope_63 > 10)
       → TRAP
  4. trend_d5 > 0 AND trend_d10 > 0 AND NOT (trend_d21 > 0)
     AND fp_count >= 3
       → EXHAUSTION
  5. fp_count >= 2 AND slope_63 > 10 AND z_63 < -2
       → BUY STRONG
  6. fp_count >= 3 AND z_63 < -2
       → BUY STRONG
  7. slope_63 > 10 AND z_63 < -2
       → BUY
  8. trend_d5 > 0 AND trend_d10 > 0 AND NOT (trend_d21 > 0)
     AND fp_count >= 1
       → RECOVERY+
  9. trend_d5 > 0 AND trend_d10 > 0 AND NOT (trend_d21 > 0)
     AND fp_count = 0
       → RECOVERY
  else
       → NULL (blank)


B6. DASHBOARD DATA JOINS
========================

The dashboard fetches from three views and joins client-side:

  v_2h_calibrated_v1_latest
    Primary source. Provides all framework columns.
    Keyed on prefixed ticker, exposes both ticker and symbol.
    
  v_2h_guidance
    Context columns: State, Mv, Trend, Trade, NEW indicator,
    T.5D/T.10D/T.21D, 1D%/5D%/1M%.
    Keyed on bare symbol. Joined to calibrated via symbol.
    
  v_positions_with_sizing
    Positions tab only. Provides Port%, Max%, %Max, Value.
    Keyed on bare symbol.

Auto-refresh: every 3 minutes (setInterval in dashboard).


B7. WHAT'S READ-ONLY VS COMPUTED
================================

  READ-ONLY (existing 2H pipeline, never modified):
    daily_ohlc, two_h_readings
    tickers_config
    v_2h_pure_v3
    mv_signals_maths
    v_2h_guidance
    positions, v_positions_with_sizing
    All macro views (v_hedgeye_*, v_macro_*)

  COMPUTED BY THIS FRAMEWORK:
    v_fingerprints_v1
    v_2h_calibrated_v1
    v_2h_calibrated_v1_latest

  CONSEQUENCE:
    The framework is fully additive. Removing it has zero effect on
    the existing 2H system. Drop the two new views and the existing
    pipeline continues unchanged.


B8. KNOWN DATA QUIRKS
=====================

Ticker format mismatch
  daily_ohlc uses prefixed (LSE:VWRL).
  two_h_readings uses bare (VWRL).
  Joins must reconcile via SPLIT_PART or tickers_config.

CSV export truncation
  Supabase SQL editor truncates strings around 255 chars on export.
  Use pg_get_viewdef() for full view definitions when needed.

Stale tickers
  Some FX feeds stale since 2026-01-25. Filter via is_fresh column
  in v_2h_calibrated_v1.
  5 tickers have data gaps: LSE:ARCK, LSE:CARP, LSE:COPX, AMEX:COPX,
  LSE:URJP. Backfill needed.

Daily_ohlc deprecation
  Frozen but not safe to drop. Still feeds mv_signal_quality.


B9. TROUBLESHOOTING
===================

Dashboard shows 404 / no data
  Likely v_2h_calibrated_v1_latest doesn't exist or hasn't refreshed.
  Verify in Supabase SQL editor:
    SELECT COUNT(*) FROM v_2h_calibrated_v1_latest;
  Should return ~300 rows. If error, recreate the view.

Tier column blank for all rows
  Either the latest refresh hasn't run, or v_fingerprints_v1 is empty.
  Manually refresh:
    REFRESH MATERIALIZED VIEW v_fingerprints_v1;
    REFRESH MATERIALIZED VIEW v_2h_calibrated_v1;

Stale data
  Check is_fresh column. False means bar_date is more than 5 days old.
  Indicates that ticker's price feed has stopped updating.

Velocity columns blank
  v_2h_guidance hasn't refreshed, or the symbol mapping is broken.
  Check that tickers_config has the symbol entry for the prefixed
  ticker.

Sort by Tier doesn't behave correctly
  The dashboard uses tier_sort (1=BUY STRONG, 2=BUY, etc.). NULL tiers
  sort to bottom. Click the Tier header to toggle direction.

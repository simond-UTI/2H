function stripPrefix(t){if(!t)return t;const i=t.indexOf(':');return i>=0?t.slice(i+1):t;}
function daysAgoISO(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}

async function load(){
  const tb=document.getElementById('tb');
  try{
    if(view==='positions'){
      await loadPositions();
    }else{
      const wlEnc=encodeURIComponent(wl);
      const wlFilter=`&watchlist=in.(${wlEnc},BOTH)`;
      const [guideRes,posRes]=await Promise.all([
        fetch(`${SURL}/rest/v1/v_2h_guidance?select=${GUIDE_COLS}${wlFilter}&limit=300`,{headers:H}),
        fetch(`${SURL}/rest/v1/positions?select=symbol`,{headers:H})
      ]);
      async function bail(label,res){
        if(res.ok)return;
        const body=await res.text().catch(()=>'(no body)');
        throw new Error(`${label}: ${res.status} — ${body.slice(0,250)}`);
      }
      await bail('guide',guideRes);
      const guideData=await guideRes.json();
      if(posRes.ok){
        const pos=await posRes.json();
        positions=new Set(pos.map(p=>p.symbol));
        if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
      }
      all=guideData.map(r=>Object.assign({},r,{
        slope:r.slope_annual_pct!=null?parseFloat(r.slope_annual_pct):null,
        z_score:r.z_score!=null?parseFloat(r.z_score):null
      }));
    }
    buildGroups();af();
  }catch(e){
    tb.innerHTML=`<tr><td colspan="21" class="msg">Error — ${e.message}</td></tr>`;
  }
}

async function loadPositions(){
  // 1. Fetch positions list
  const posRes=await fetch(`${SURL}/rest/v1/positions?select=symbol`,{headers:H});
  if(!posRes.ok)throw new Error('positions: '+posRes.status);
  const pos=await posRes.json();
  positions=new Set(pos.map(p=>p.symbol).filter(s=>s&&s!=='CASH'&&s!=='Cash'));
  if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
  // 2. Fetch sizing + guidance for held symbols in parallel
  const symList=[...positions].map(s=>encodeURIComponent(s)).join(',');
  const [sizeRes,guideRes]=await Promise.all([
    fetch(`${SURL}/rest/v1/v_positions_with_sizing?select=symbol,portfolio_pct,effective_max_pct,pct_of_max,value_gbp`,{headers:H}),
    fetch(`${SURL}/rest/v1/v_2h_guidance?select=${GUIDE_COLS}&symbol=in.(${symList})&limit=100`,{headers:H})
  ]);
  if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
  if(!guideRes.ok){
    const body=await guideRes.text().catch(()=>'');
    throw new Error(`guide: ${guideRes.status} — ${body.slice(0,200)}`);
  }
  const sizeData=await sizeRes.json();
  const guideData=await guideRes.json();
  // 3. Build sizing map (aggregate across accounts if needed — v_positions_with_sizing should already be aggregated)
  positionSizing={};
  sizeData.forEach(s=>{
    if(!s.symbol||s.symbol==='CASH'||s.symbol==='Cash')return;
    const entry={
      portfolio_pct:parseFloat(s.portfolio_pct)||0,
      effective_max_pct:parseFloat(s.effective_max_pct)||0,
      pct_of_max:parseFloat(s.pct_of_max)||0,
      value_gbp:parseFloat(s.value_gbp)||0
    };
    positionSizing[s.symbol]=entry;
    if(s.symbol==='BIT-XBTE')positionSizing['BTCUSD']=entry;
  });
  // 4. Merge guidance + sizing
  all=guideData.map(r=>{
    const sz=positionSizing[r.symbol]||{};
    return Object.assign({},r,sz,{
      slope:r.slope_annual_pct!=null?parseFloat(r.slope_annual_pct):null,
      z_score:r.z_score!=null?parseFloat(r.z_score):null
    });
  });
}

  document.getElementById('tabUniv').classList.toggle('on',v==='universe');
  document.getElementById('tabPos').classList.toggle('on',v==='positions');
  document.getElementById('tabPort').classList.toggle('on',v==='portfolio');

  document.getElementById('macroSubNav').style.display=v==='macro'?'':'none';

  if(v==='universe'||v==='positions'){
    document.getElementById('filterbar').style.display='';
    document.getElementById('wrap-main').style.display='';

    document.getElementById('filterbar').style.display='none';
    document.getElementById('wrap-main').style.display='none';
    document.getElementById('wrap-portfolio').style.display='';
    document.getElementById('wrap-macro').style.display='none';
  }else if(v==='macro'){
    document.getElementById('wrap-portfolio').style.display='none';
    // setMacro handles wrap-main / wrap-macro + filterbar per preset
  }
  grp='';state='';sig='';guide='';alertMode='';
  ['gsel','stsel','sigsel','gdsel','alsel'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  if(v==='portfolio'){
    loadPortfolio();
  }else if(v==='macro'){
    // Always start on Risk Ranges when entering Macro
    macroPreset='riskranges';
    setMacro('riskranges');
  }else{
    renderHeader();
    load();
  }
}

async function loadPortfolio(){
  const host=document.getElementById('portfolio-host');
  host.textContent='Loading…';
  try{
    const [perfRes,accRes,sizeRes,benchRes]=await Promise.all([
      fetch(`${SURL}/rest/v1/v_portfolio_performance?select=*`,{headers:H}),
      fetch(`${SURL}/rest/v1/positions?select=account,symbol,value_gbp`,{headers:H}),
      fetch(`${SURL}/rest/v1/v_positions_with_sizing?select=symbol,value_gbp,group_name,sub_group,portfolio_pct`,{headers:H}),
      fetch(`${SURL}/rest/v1/v_crossover_states?symbol=in.(SPX,NDX,RUT)&select=symbol,perf_1d,perf_5d,perf_1m,perf_3m`,{headers:H})
    ]);
    if(!perfRes.ok)throw new Error('performance: '+perfRes.status);
    if(!accRes.ok)throw new Error('accounts: '+accRes.status);
    if(!sizeRes.ok)throw new Error('sizing: '+sizeRes.status);
    const perf=await perfRes.json();
    const accRaw=await accRes.json();
    const sizeRaw=await sizeRes.json();
    const benchmarks=benchRes.ok?await benchRes.json():[];
    renderPortfolio(perf,accRaw,sizeRaw,benchmarks);
  }catch(e){
    host.innerHTML=`<div style="padding:40px 0;color:${R}">Error — ${e.message}</div>`;
  }
}

// Exact GBP: rounds to nearest £ and comma-separates. No £k rounding.
function gbp(v){
  if(v==null||isNaN(v))return '-';
  const n=Math.round(parseFloat(v));
  return'£'+n.toLocaleString('en-GB');
}
function gbpSigned(v){
  if(v==null||isNaN(v))return '-';
  const n=Math.round(parseFloat(v));
  const col=n>0?G:n<0?R:W;
  return`<span style="color:${col}">${n>=0?'+':''}£${Math.abs(n).toLocaleString('en-GB')}</span>`;
}
function pctSigned(v,d=2){
  if(v==null||isNaN(v))return '-';
  const n=parseFloat(v);
  const col=n>0?G:n<0?R:W;
  return`<span style="color:${col}">${n>=0?'+':''}${n.toFixed(d)}%</span>`;
}
function pctPlain(v,d=1){
  if(v==null||isNaN(v))return '-';
  return parseFloat(v).toFixed(d)+'%';
}

function renderPortfolio(perf,accRaw,sizeRaw,benchmarks){
  const host=document.getElementById('portfolio-host');
  // --- Summary: Today + Total ---
  const daily=perf.find(p=>p.period==='Daily')||{};
  const totalValue=parseFloat(daily.end_value)||0;
  const todayGain=parseFloat(daily.gain_value)||0;
  const todayPct=parseFloat(daily.gain_pct)||0;
  const todayCol=todayGain>=0?G:R;
  const summary=`<div class="summary-row">
    <div class="summary-item"><div class="lbl">Total Value</div><div class="val">${gbp(totalValue)}</div></div>
    <div class="summary-item"><div class="lbl">Today</div><div class="val" style="color:${todayCol}">${todayGain>=0?'+':''}${gbp(Math.abs(todayGain))} (${todayPct>=0?'+':''}${todayPct.toFixed(2)}%)</div></div>
  </div>`;
  // --- Performance table ---
  const periods=['Daily','WoW','MTD','QTD','YTD','All Time'];
  let perfRows='';
  periods.forEach(p=>{
    const d=perf.find(x=>x.period===p)||{};
    const gv=parseFloat(d.gain_value)||0;
    const gp=parseFloat(d.gain_pct)||0;
    const cf=parseFloat(d.net_cash_flow)||0;
    const rg=parseFloat(d.real_gain)||0;
    const rp=parseFloat(d.real_gain_pct)||0;
    const hasCf=Math.abs(cf)>1;
    perfRows+=`<tr>
      <td>${p}</td>
      <td class="n">${gbpSigned(gv)}</td>
      <td class="n">${pctSigned(gp)}</td>
      <td class="n">${hasCf?gbpSigned(cf):'-'}</td>
      <td class="n">${hasCf?gbpSigned(rg):'-'}</td>
      <td class="n">${hasCf?pctSigned(rp):'-'}</td>
    </tr>`;
  });
  const perfSec=`<div class="psec">
    <div class="psec-title">Performance</div>
    <table class="pt">
      <thead><tr><th>Period</th><th class="n">Gain £</th><th class="n">Gain %</th><th class="n">Cash Flow</th><th class="n">Real Gain £</th><th class="n">Real %</th></tr></thead>
      <tbody>${perfRows}</tbody>
    </table>
  </div>`;
  // --- Benchmarks ---
  const portPerf={'1d':parseFloat((perf.find(p=>p.period==='Daily')||{}).gain_pct)||0,
                  '5d':parseFloat((perf.find(p=>p.period==='WoW')||{}).gain_pct)||0,
                  '1m':parseFloat((perf.find(p=>p.period==='MTD')||{}).gain_pct)||0};
  const benchOrder=['SPX','NDX','RUT'];
  const benchNames={'SPX':'S&P 500','NDX':'NASDAQ','RUT':'Russell 2000'};
  let benchRows=`<tr><td>Portfolio</td><td class="n">${pctSigned(portPerf['1d'])}</td><td class="n">${pctSigned(portPerf['5d'])}</td><td class="n">${pctSigned(portPerf['1m'])}</td><td class="n">-</td></tr>`;
  benchOrder.forEach(sym=>{
    const b=benchmarks.find(x=>x.symbol===sym);
    if(b){
      benchRows+=`<tr><td>${benchNames[sym]}</td>
        <td class="n">${pctSigned(b.perf_1d)}</td>
        <td class="n">${pctSigned(b.perf_5d)}</td>
        <td class="n">${pctSigned(b.perf_1m)}</td>
        <td class="n">${pctSigned(b.perf_3m)}</td>
      </tr>`;
    }
  });
  const benchSec=`<div class="psec">
    <div class="psec-title">vs US Indices</div>
    <table class="pt">
      <thead><tr><th></th><th class="n">1D</th><th class="n">5D</th><th class="n">1M</th><th class="n">3M</th></tr></thead>
      <tbody>${benchRows}</tbody>
    </table>
  </div>`;
  // --- Accounts with Cash % ---
  const accounts={};
  let totalCash=0,totalVal=0;
  accRaw.forEach(p=>{
    if(!accounts[p.account])accounts[p.account]={value:0,cash:0};
    const v=parseFloat(p.value_gbp)||0;
    accounts[p.account].value+=v;
    totalVal+=v;
    if(p.symbol==='CASH'||p.symbol==='Cash'){
      accounts[p.account].cash+=v;
      totalCash+=v;
    }
  });
  const accOrder=['Si SIPP','Si SIPP II','Si ISA','Wife ISA'];
  const accSorted=Object.entries(accounts).sort((a,b)=>{
    const ai=accOrder.indexOf(a[0]),bi=accOrder.indexOf(b[0]);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return -1;
    if(bi>=0)return 1;
    return b[1].value-a[1].value;
  });
  let accRows='';
  accSorted.forEach(([name,d])=>{
    const cashPct=d.value>0?(d.cash/d.value*100):0;
    accRows+=`<tr>
      <td>${name}</td>
      <td class="n">${gbp(d.value)}</td>
      <td class="n">${gbp(d.cash)}</td>
      <td class="n">${cashPct.toFixed(1)}%</td>
    </tr>`;
  });
  const totalCashPct=totalVal>0?(totalCash/totalVal*100):0;
  accRows+=`<tr class="tot">
    <td>TOTAL</td>
    <td class="n">${gbp(totalVal)}</td>
    <td class="n">${gbp(totalCash)}</td>
    <td class="n">${totalCashPct.toFixed(1)}%</td>
  </tr>`;
  const accSec=`<div class="psec">
    <div class="psec-title">Accounts</div>
    <table class="pt">
      <thead><tr><th>Account</th><th class="n">Value</th><th class="n">Cash</th><th class="n">Cash %</th></tr></thead>
      <tbody>${accRows}</tbody>
    </table>
  </div>`;
  // --- By Group ---
  const groupStats={};
  let gTotalValue=0;
  const symbolTotals={};
  sizeRaw.forEach(p=>{
    if(!p.symbol||p.symbol==='CASH'||p.symbol==='Cash')return;
    const v=parseFloat(p.value_gbp)||0;
    const pc=parseFloat(p.portfolio_pct)||0;
    if(!symbolTotals[p.symbol])symbolTotals[p.symbol]={symbol:p.symbol,value:0,pct:0,group:p.group_name};
    symbolTotals[p.symbol].value+=v;
    symbolTotals[p.symbol].pct+=pc;
  });
  Object.values(symbolTotals).forEach(pos=>{
    const g=pos.group||'OTHER';
    if(!groupStats[g])groupStats[g]={count:0,value:0,positions:[]};
    groupStats[g].count++;
    groupStats[g].value+=pos.value;
    gTotalValue+=pos.value;
    groupStats[g].positions.push(pos);
  });
  const groupSorted=Object.entries(groupStats).sort((a,b)=>{
    if(a[0]==='CASH')return 1;
    if(b[0]==='CASH')return -1;
    return b[1].value-a[1].value;
  });
  let groupRows='';
  groupSorted.forEach(([name,d])=>{
    const allocPct=gTotalValue>0?(d.value/gTotalValue*100):0;
    d.positions.sort((a,b)=>b.value-a.value);
    const posText=d.positions.map(p=>`<span style="margin-right:18px;white-space:nowrap"><span style="color:${W}">${p.symbol}</span> <span style="color:rgba(255,255,255,0.55)">${p.pct.toFixed(1)}%</span></span>`).join('');
    groupRows+=`<tr>
      <td>${name}</td>
      <td class="n">${d.count}</td>
      <td class="n">${allocPct.toFixed(1)}%</td>
      <td class="n">${gbp(d.value)}</td>
      <td style="padding-left:32px;font-size:11px">${posText||'-'}</td>
    </tr>`;
  });
  const groupSec=`<div class="psec">
    <div class="psec-title">By Group</div>
    <table class="pt">
      <thead><tr><th>Group</th><th class="n">#</th><th class="n">Alloc%</th><th class="n">Value</th><th style="padding-left:32px">Positions</th></tr></thead>
      <tbody>${groupRows}</tbody>
    </table>
  </div>`;
  host.innerHTML=summary+perfSec+benchSec+accSec+groupSec;
}

function rrTrendColor(t){
  if(!t)return W;
  const u=t.toUpperCase();
  if(u==='BULLISH')return G;
  if(u==='BEARISH')return R;
  return W;
}
function rrFormatPrice(v){
  if(v==null||isNaN(v))return dash;
  const n=parseFloat(v);
  if(n>=1000)return n.toLocaleString('en-US',{maximumFractionDigits:0});
  if(n<10)return n.toFixed(4);
  return n.toFixed(2);
}
function rrPosCell(pct){
  if(pct==null||isNaN(pct))return dash;
  const n=parseFloat(pct);
  const r=Math.round(n);
  let col=W;
  if(n>100)col=R;
  else if(n>=75)col=R;
  else if(n<0)col=G;
  else if(n<=25)col=G;
  return`<span style="color:${col}">${r}%</span>`;
}
function rrChgCell(v){
  if(v==null||isNaN(v))return dash;
  const n=parseFloat(v);
  const col=n>0?G:n<0?R:W;
  return`<span style="color:${col}">${n>=0?'+':''}${n.toFixed(2)}%</span>`;
}

function titleCase(s){if(!s)return s;return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());}

function buildGroups(){
  const b=(view==='universe'&&wl)?all.filter(r=>r.watchlist===wl||r.watchlist==='BOTH'):all;
  const gs=[...new Set(b.map(r=>r.group_name).filter(Boolean))].sort();
  const sel=document.getElementById('gsel');
  const cur=sel.value;
  sel.innerHTML='<option value="">All Groups</option>'+gs.map(g=>`<option value="${g}"${g===cur?' selected':''}>${titleCase(g)}</option>`).join('');
  if(!gs.includes(grp)){sel.value='';grp='';}
}

function base(){
  const bullStates=['BULL ACCEL','BULL ESTAB','EARLY RECV'];
  const bearStates=['BULL FADING','BEAR DECEL','BEAR ACCEL'];
  return all.filter(r=>{
    if(view==='universe'&&wl&&r.watchlist!==wl&&r.watchlist!=='BOTH')return false;
    if(grp&&r.group_name!==grp)return false;
    if(state&&r.state_name!==state)return false;
    if(guide&&r.guidance!==guide)return false;
    if(sig==='__NONE__'&&r.signal)return false;
    if(sig&&sig!=='__NONE__'&&r.signal!==sig)return false;
    if(alertMode){
      if(alertMode==='any'&&!r.state_changed)return false;
      if(alertMode==='entries'&&!(r.state_changed&&bullStates.includes(r.state_name)))return false;
      if(alertMode==='exits'&&!(r.state_changed&&bearStates.includes(r.state_name)))return false;
    }
    return true;
  });
}

function af(){
  const s=document.getElementById('sr').value.toLowerCase();
  let b=base().filter(r=>{
    if(s&&!(r.symbol||'').toLowerCase().includes(s)&&!(r.name||'').toLowerCase().includes(s)&&!(r.group_name||'').toLowerCase().includes(s))return false;
    return true;
  });
  filt=b;
  sort();render();
}

function sb(c){
  if(sc===c)sd*=-1;
  else{sc=c;sd=c==='rank_move'?1:-1;}
  document.querySelectorAll('tr.ch th').forEach(t=>t.classList.remove('s'));
  event?.target?.classList.add('s');
  sort();render();
}

function sort(){
  filt.sort((a,b)=>{
    let av=a[sc],bv=b[sc];
    if(av==null)av=sd>0?Infinity:-Infinity;
    if(bv==null)bv=sd>0?Infinity:-Infinity;
    if(typeof av==='string')return av.localeCompare(bv)*sd;
    return(av-bv)*sd;
  });
}

};

const pct=(v,d=1)=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>0?G:f<0?R:W;
  return`<span style="color:${col}">${f>=0?'+':''}${f.toFixed(d)}%</span>`;
};

const rmv=v=>{
  if(v==null||v===''||v===undefined)return dash;
  const i=parseInt(v);
  if(isNaN(i)||i===0)return dash;
  return`<span style="color:${i>0?G:R}">${i>0?'+':''}${i}</span>`;
};

// Slope: green if slope > +5%, red if < -5%, white otherwise (flat regime)
const slopeCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>5?G:f<-5?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(1)}%</span>`;
};

// Trend-ROC: green if > +1, red if < -1, white otherwise
const rocCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>1?G:f<-1?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(1)}</span>`;
};

// z: green if < -1 (oversold = opportunity), red if > +1 (stretched = caution), white otherwise
const zCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f<-1?G:f>1?R:W;
  return`<span style="color:${col}">${f>0?'+':''}${f.toFixed(2)}</span>`;
};

// Sig: BUY signals green, EXTREME TOP red, STRETCHED white (caution but no action yet)
const sigCell=v=>{
  if(!v)return dash;
  let col=W;
  if(v==='BUY STRONG'||v==='BUY SETUP')col=G;
  else if(v==='EXTREME TOP')col=R;
  return`<span style="color:${col};font-weight:600">${v}</span>`;
};

// State: bullish green, bearish red, transitional white
const stateCell=v=>{
  if(!v)return dash;
  let col=W;
  if(v==='BULL ACCEL'||v==='BULL ESTAB')col=G;
  else if(v==='BEAR DECEL'||v==='BEAR ACCEL')col=R;
  return`<span style="color:${col}">${v}</span>`;
};

// Pivot State: uptrend green, downtrend red, else white
const STRUCT_LABEL={
  'UPTREND_STRONG':'UPTREND STRONG','UPTREND_OK':'UPTREND OK','UPTREND_FAIL':'UPTREND FAIL',
  'DOWNTREND_STRONG':'DOWNTREND STRONG','DOWNTREND_OK':'DOWNTREND OK','DOWNTREND_FAIL':'DOWNTREND FAIL',
  'TOP_FORMING':'TOP FORMING','BOTTOM_FORMING':'BOTTOM FORMING','RANGE':'RANGE','INSUFFICIENT':'—'
};
const pivotCell=s=>{
  if(s==null||s==='')return dash;
  const label=STRUCT_LABEL[s]||s;
  let col=W;
  if(s==='UPTREND_STRONG'||s==='UPTREND_OK')col=G;
  else if(s==='DOWNTREND_STRONG'||s==='DOWNTREND_OK')col=R;
  return`<span style="color:${col}" title="${s}">${label}</span>`;
};

// Guidance: green for BUY/WATCH/BUY STRONG/BREAKOUT, red for EXIT/TRIM/FADE/AVOID/DANGER, white for HOLD/REVIEW
const guidanceCell=(g,reason)=>{
  if(!g)return dash;
  let col=W;
  let weight=600;
  if(g==='BUY STRONG'||g==='BUY'||g==='BREAKOUT')col=G;
  else if(g==='WATCH')col=G;
  else if(g==='EXIT'||g==='TRIM'||g==='AVOID'||g==='DANGER')col=R;
  else if(g==='FADE')col=R;
  else weight=400;
  const reasonSafe=(reason||'').replace(/"/g,'&quot;');
  return`<span style="color:${col};font-weight:${weight}" title="${reasonSafe}">${g}</span>`;
};

// Size formatters — Positions view
const portPctCell=v=>{
  if(v==null||isNaN(v))return dash;
  return`<span style="color:${W}">${parseFloat(v).toFixed(1)}%</span>`;
};
const maxPctCell=v=>{
  if(v==null||isNaN(v))return dash;
  return`<span style="color:${W}">${parseFloat(v).toFixed(1)}%</span>`;
};
// %Max: integer, colour red if >100 (over-sized)
const pctMaxCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=parseFloat(v);
  const col=f>100?R:W;
  return`<span style="color:${col}">${Math.round(f)}%</span>`;
};
// Value: exact GBP to nearest £
const valueCell=v=>{
  if(v==null||isNaN(v))return dash;
  const f=Math.round(parseFloat(v));
  return`<span style="color:${W}">£${f.toLocaleString('en-GB')}</span>`;
};

// Read: plain English dimensional story. No colour — text only.
const readCell=s=>{
  if(!s)return dash;
  return`<span style="color:${W};font-size:11px">${s}</span>`;
};

function render(){
  const tb=document.getElementById('tb');
  if(!filt.length){tb.innerHTML='<tr><td colspan="21" class="msg">No results</td></tr>';return;}
  const showSize=view==='positions';
  tb.innerHTML=filt.map(r=>{
    const isHeld=positions.has(r.symbol);
    const tickerCell=isHeld
      ?`<td class="held" title="${(r.name||'').replace(/"/g,'&quot;')}"><span style="color:${W};font-weight:600">${r.symbol}</span></td>`
      :`<td title="${(r.name||'').replace(/"/g,'&quot;')}"><span style="color:${W};font-weight:600">${r.symbol}</span></td>`;
    const sizeCells=showSize?
      `<td class="gsep-lg">${portPctCell(r.portfolio_pct)}</td>`+
      `<td>${maxPctCell(r.effective_max_pct)}</td>`+
      `<td>${pctMaxCell(r.pct_of_max)}</td>`+
      `<td class="gend">${valueCell(r.value_gbp)}</td>`
      :'';
    const stateSep=showSize?'gsep-lg':'gsep-lg';  // same either way — state starts a group
    return`<tr>`+
      tickerCell+
      `<td><span style="color:${W};max-width:100px;overflow:hidden;text-overflow:ellipsis;display:block;white-space:nowrap;font-size:11px">${r.group_name||''}</span></td>`+
      sizeCells+
      `<td class="${stateSep}">${stateCell(r.state_name)}${r.state_changed?' <span style="color:'+G+';font-size:9px;font-weight:700">NEW</span>':''}</td>`+
      `<td>${rmv(r.rank_move)}</td>`+
      `<td class="gend">${guidanceCell(r.guidance,r.guidance_reason)}</td>`+
      `<td class="gsep">${numSigned(r.trend)}</td>`+
      `<td class="gend">${numSigned(r.momentum)}</td>`+
      `<td class="gsep">${sigCell(r.signal)}</td>`+
      `<td>${zCell(r.z_score)}</td>`+
      `<td class="gend">${slopeCell(r.slope)}</td>`+
      `<td class="gsep">${rocCell(r.trend_d21)}</td>`+
      `<td>${rocCell(r.trend_d10)}</td>`+
      `<td class="gend">${rocCell(r.trend_d5)}</td>`+
      `<td class="gsep gend">${pivotCell(r.structure_3p)}</td>`+
      `<td class="gsep">${pct(r.perf_1d)}</td>`+
      `<td>${pct(r.perf_5d)}</td>`+
      `<td class="gend">${pct(r.perf_1m)}</td>`+
      `<td class="gsep">${readCell(r.read_note)}</td>`+
      `</tr>`;
  }).join('');
}

renderHeader();
load();
setInterval(load,3*60*1000);

async function openSpec(){
  document.getElementById('specOverlay').classList.add('on');
  const body=document.getElementById('specBody');
  const head=document.getElementById('specHead');
  body.textContent='Loading spec…';
  head.textContent='loading...';
  try{
    const res=await fetch(`${SURL}/rest/v1/spec_2h_sections?select=section_order,section_title,content,updated_at&order=section_order.asc`,{headers:H});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const sections=await res.json();
    if(!sections.length){body.textContent='Spec table exists but is empty.';head.textContent='empty';return;}
    const latest=sections.reduce((a,s)=>{const d=new Date(s.updated_at);return d>a?d:a;},new Date(0));
    body.textContent=sections.map(s=>{
      const underline='='.repeat(s.section_title.length);
      return`${s.section_order}. ${s.section_title}\n${underline}\n${s.content.trim()}\n`;
    }).join('\n\n');
    head.textContent=`${sections.length} sections · updated ${latest.toISOString().slice(0,10)}`;
  }catch(e){
    body.textContent=`Error loading spec: ${e.message}`;
    head.textContent='error';
  }
}
function closeSpec(){document.getElementById('specOverlay').classList.remove('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSpec();});

h>th.gsep-lg{padding-left:36px!important}tr.gh>th.gsep-lg{padding-left:36px!important}tr.ch>th{font-size:12px;font-weight:600;color:#fff!important;padding:4px 12px 5px 0;text-align:left!important;background:#13151a;border-bottom:1px solid rgba(255,255,255,0.15);cursor:pointer;white-space:nowrap;user-select:none}tr.ch>th:first-child{padding-left:16px}tr.ch>th:hover{color:#00e676!important}tr.ch>th.s{color:#00e676!important}tr.ch>th.gend{padding-right:32px!important}td{padding:0 12px 0 0;height:26px;border:none;vertical-align:middle;white-space:nowrap;text-align:left;font-size:12px;color:#fff!important}td:first-child{padding-left:16px}td.gend{padding-right:32px!important}tr:hover>td{background:rgba(255,255,255,0.04)}.msg{padding:40px 16px;color:#fff;font-size:12px}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#13151a}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}.tip{cursor:pointer}.nav-link{font-size:11px;color:#fff;cursor:pointer;font-family:'Roboto Mono',monospace;letter-spacing:0.05em;user-select:none;text-decoration:none}.spec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}.spec-overlay.on{display:flex}.spec-modal{background:#0d0f13;border:1px solid rgba(255,255,255,0.2);width:min(900px,95vw);max-height:90vh;display:flex;flex-direction:column;font-family:'Roboto Mono',monospace}.spec-head{display:flex;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.15);flex-shrink:0}.spec-head .t{font-size:13px;font-weight:600;color:#fff;letter-spacing:0.05em}.spec-head .m{font-size:11px;color:#fff;margin-left:auto}.spec-head .x{font-size:16px;color:#fff;cursor:pointer;padding:0 4px;user-select:none}.spec-body{overflow-y:auto;padding:16px 20px;font-size:11px;line-height:1.55;color:#fff;white-space:pre-wrap;font-family:'Roboto Mono',monospace;word-wrap:break-word}tr.ch>th:first-child{position:sticky;left:0;background:#13151a;z-index:11}tr.gh>th:first-child{position:sticky;left:0;background:#13151a;z-index:11}tbody td:first-child{position:sticky;left:0;background:#13151a;z-index:5}tbody tr:hover td:first-child{background:#1a1d24}.held{border-left:4px solid #fff!important;padding-left:12px!important}.tabs{display:flex;gap:4px}.tab{font-size:11px;color:rgba(255,255,255,0.55);cursor:pointer;letter-spacing:0.05em;user-select:none;padding:2px 2px}.tab.on{color:#fff}.tab:hover{color:#fff}.pwrap{overflow-y:auto;height:calc(100vh - 54px);padding:24px 16px;-webkit-overflow-scrolling:touch}.psec{margin-bottom:36px}.psec-title{font-size:11px;font-weight:600;color:#fff;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.15)}.pt{border-collapse:separate;border-spacing:0;font-size:12px;font-family:'Roboto Mono',monospace}.pt th{font-size:11px;font-weight:600;color:#fff;letter-spacing:0.05em;text-transform:uppercase;padding:4px 24px 6px 0;text-align:left;border-bottom:1px solid rgba(255,255,255,0.15);white-space:nowrap}.pt th.n{text-align:right}.pt td{padding:4px 24px 4px 0;text-align:left;white-space:nowrap;color:#fff;height:24px}.pt td.n{text-align:right;font-variant-numeric:tabular-nums}.pt td:first-child,.pt th:first-child{padding-left:0}.pt .tot td{border-top:1px solid rgba(255,255,255,0.25);font-weight:600;padding-top:8px}.summary-row{display:flex;gap:48px;margin-bottom:24px;font-family:'Roboto Mono',monospace}.summary-item{font-size:11px}.summary-item .lbl{color:rgba(255,255,255,0.55);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}.summary-item .val{font-size:18px;font-weight:600;color:#fff}</style></head><body>

<script>
var SURL='https://pzskvslhfaituzyukasl.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6c2t2c2xoZmFpdHV6eXVrYXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzQyNTAsImV4cCI6MjA3OTY1MDI1MH0.FEZTIIQ4zgdb7uswf70XZI9Ph6ykSeDkfxooIcRIOMw';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY};
var G='#4ade80',R='#ff1744',W='#fff';

var tooltips={};
async function loadTooltips(){
  try{
    var res=await fetch(SURL+'/rest/v1/tooltip_definitions?select=column_key,label,description,construction,thresholds,decision_use',{headers:H});
    if(!res.ok)return;
    var data=await res.json();
    data.forEach(function(t){tooltips[t.column_key]=t;});
    if(view==='universe'||view==='positions')renderHeader();
  }catch(e){console.warn('tooltips:',e);}
}
function tip(key){
  var t=tooltips[key];
  if(!t)return '';
  return t.label+'\n\n'+t.description+'\n\nCONSTRUCTION\n'+t.construction+'\n\nTHRESHOLDS\n'+t.thresholds+'\n\nDECISION USE\n'+t.decision_use;
}
function tipAttr(key){var s=tip(key);return s?' data-tip="'+s.replace(/"/g,'&quot;')+'"':'';}

var REGIME_COLS='symbol,name,group_name,watchlist,trend,momentum,state_name,slope_annual_pct,z_score,perf_1d,perf_5d,perf_1m,flip_s,flip_t,flip_m,regime,chan_w_pct,atr,close';
var VOL_COLS='symbol,name,group_name,watchlist,trend,momentum,state_name,slope_annual_pct,z_score,perf_1d,perf_5d,perf_1m,flip_s,flip_t,flip_m,regime,perf_1m,atr,close';
var all=[],filt=[],positions=new Set(),positionSizing={};
var sc='trend',sd=-1,wl='UK ETFS',grp='',state='',regime='',view='universe',macroPreset='riskranges';

function parseRow(r){
  var atr=parseFloat(r.atr),close=parseFloat(r.close);
  var atr_pct=(atr>0&&close>0)?(atr/close*100):null;
  return Object.assign({},r,{
    slope:r.slope_annual_pct!=null?parseFloat(r.slope_annual_pct):null,
    z_score:r.z_score!=null?parseFloat(r.z_score):null,
    chan_w_pct:r.chan_w_pct!=null?parseFloat(r.chan_w_pct):null,
    flip_s:parseInt(r.flip_s)||0,flip_t:parseInt(r.flip_t)||0,flip_m:parseInt(r.flip_m)||0,
    atr_pct:atr_pct
  });
}
async function load(){
  var tb=document.getElementById('tb');
  try{
    if(view==='positions'){await loadPositions();}
    else{
      var wlFilter='&watchlist=in.('+encodeURIComponent(wl)+',BOTH)';
      var [regRes,posRes,flipRes]=await Promise.all([
        fetch(SURL+'/rest/v1/v_2h_regime?select='+REGIME_COLS+wlFilter+'&limit=300',{headers:H}),
        fetch(SURL+'/rest/v1/positions?select=symbol',{headers:H}),
        fetch(SURL+'/rest/v1/v_flip_daily_summary?select=symbol,flip_t_last,flip_m_last,flip_t_count,flip_m_count',{headers:H}).catch(function(){return{ok:false};})
      ]);
      if(!regRes.ok){var b=await regRes.text().catch(function(){return'';});throw new Error('regime: '+regRes.status+' — '+b.slice(0,250));}
      var regData=await regRes.json();
      if(posRes.ok){var pos=await posRes.json();positions=new Set(pos.map(function(p){return p.symbol;}));if(positions.has('BIT-XBTE'))positions.add('BTCUSD');}
      // Merge flip summary into regime data
      var flipMap={};
      if(flipRes.ok){var flipData=await flipRes.json();flipData.forEach(function(f){flipMap[f.symbol]=f;});}
      all=regData.map(function(r){
        var f=flipMap[r.symbol];
        if(f){
          // Use event-based flips where available, fall back to v_2h_regime instantaneous
          r=Object.assign({},r,{
            flip_t:f.flip_t_last!=null?f.flip_t_last:r.flip_t,
            flip_m:f.flip_m_last!=null?f.flip_m_last:r.flip_m,
            flip_t_count:f.flip_t_count||0,
            flip_m_count:f.flip_m_count||0
          });
        }
        return parseRow(r);
      });
    }
    buildGroups();af();
  }catch(e){tb.innerHTML='<tr><td colspan="19" class="msg">Error — '+e.message+'</td></tr>';}
}
async function loadPositions(){
  var posRes=await fetch(SURL+'/rest/v1/positions?select=symbol',{headers:H});
  if(!posRes.ok)throw new Error('positions: '+posRes.status);
  var pos=await posRes.json();
  positions=new Set(pos.map(function(p){return p.symbol;}).filter(function(s){return s&&s!=='CASH'&&s!=='Cash';}));
  if(positions.has('BIT-XBTE'))positions.add('BTCUSD');
  var symList=Array.from(positions).map(encodeURIComponent).join(',');
  // Fetch independently so a sizing 500 doesn't kill regime display
  var sizeRes=await fetch(SURL+'/rest/v1/v_positions_with_sizing?select=symbol,portfolio_pct,effective_max_pct,pct_of_max,value_gbp',{headers:H}).catch(function(){return{ok:false};});
  var regRes=await fetch(SURL+'/rest/v1/v_2h_regime?select='+REGIME_COLS+'&symbol=in.('+symList+')&limit=100',{headers:H});
  if(!regRes.ok){var b=await regRes.text().catch(function(){return'';});throw new Error('regime: '+regRes.status+' — '+b.slice(0,200));}
  positionSizing={};
  if(sizeRes.ok){
    (await sizeRes.json()).forEach(function(s){
      if(!s.symbol||s.symbol==='CASH'||s.symbol==='Cash')return;
      var entry={portfolio_pct:parseFloat(s.portfolio_pct)||0,effective_max_pct:parseFloat(s.effective_max_pct)||0,pct_of_max:parseFloat(s.pct_of_max)||0,value_gbp:parseFloat(s.value_gbp)||0};
      positionSizing[s.symbol]=entry;if(s.symbol==='BIT-XBTE')positionSizing['BTCUSD']=entry;
    });
  }
  all=(await regRes.json()).map(function(r){return Object.assign(parseRow(r),positionSizing[r.symbol]||{});});
}

function setView(v){
  view=v;
  document.getElementById('tabUniv').classList.toggle('on',v==='universe');
  document.getElementById('tabPos').classList.toggle('on',v==='positions');
  document.getElementById('tabPort').classList.toggle('on',v==='portfolio');
  document.getElementById('tabMacro').classList.toggle('on',v==='macro');
  document.getElementById('wltoggle').style.display='';
  document.getElementById('macroSubNav').style.display=v==='macro'?'':'none';
  if(v==='universe'||v==='positions'){document.getElementById('filterbar').style.display='';document.getElementById('wrap-main').style.display='';document.getElementById('wrap-portfolio').style.display='none';document.getElementById('wrap-macro').style.display='none';}
  else if(v==='portfolio'){document.getElementById('filterbar').style.display='none';document.getElementById('wrap-main').style.display='none';document.getElementById('wrap-portfolio').style.display='';document.getElementById('wrap-macro').style.display='none';}
  else if(v==='macro'){document.getElementById('wrap-portfolio').style.display='none';}
  grp='';state='';regime='';
  ['gsel','stsel','rgsel'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  if(v==='portfolio')loadPortfolio();
  else if(v==='macro'){macroPreset='riskranges';setMacro('riskranges');}
  else{renderHeader();load();}
}

function renderHeader(){
  var h=document.getElementById('th-host');
  var showSize=view==='positions';
  var sizeGH=showSize?'<th colspan="4" class="gsep-lg gend">Size</th>':'';
  var sizeCH=showSize?
    '<th class="gsep-lg tip" style="min-width:54px" onclick="sb(\'portfolio_pct\')" data-tip="PORT % — Current portfolio weight across all accounts.">Port%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'effective_max_pct\')" data-tip="MAX % — SPX-vol-adjusted maximum position size.">Max%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'pct_of_max\')" data-tip="% OF MAX — Current size as % of max. >100% = oversized.">%Max</th>'+
    '<th class="tip gend" style="min-width:76px" onclick="sb(\'value_gbp\')" data-tip="VALUE — GBP value across all accounts.">Value</th>':'';
  h.innerHTML=
    '<tr class="gh"><th class="blank" colspan="2"></th>'+sizeGH+
    '<th colspan="4" class="gsep-lg gend">State + Flips</th>'+
    '<th colspan="6" class="gsep gend">Core</th>'+
    '<th colspan="1" class="gsep gend">Regime</th>'+
    '<th colspan="3" class="gsep gend">Recent</th></tr>'+
    '<tr class="ch">'+
    '<th style="min-width:70px;padding-left:16px" onclick="sb(\'symbol\')">Ticker</th>'+
    '<th style="min-width:80px;max-width:100px" onclick="sb(\'group_name\')">Group</th>'+
    sizeCH+
    '<th class="gsep-lg tip" style="min-width:110px" onclick="sb(\'state_name\')"'+tipAttr('state')+'>State</th>'+
    '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_s\')"'+tipAttr('flip_s')+'>S</th>'+
    '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_t\')"'+tipAttr('flip_t')+'>T</th>'+
    '<th class="tip gend" style="min-width:28px;text-align:center" onclick="sb(\'flip_m\')"'+tipAttr('flip_m')+'>M</th>'+
    '<th class="gsep tip" style="min-width:62px" onclick="sb(\'slope\')"'+tipAttr('slope')+'>Slope</th>'+
    '<th class="tip" style="min-width:52px" onclick="sb(\'trend\')"'+tipAttr('trend')+'>Trend</th>'+
    '<th class="tip" style="min-width:52px" onclick="sb(\'momentum\')"'+tipAttr('trade')+'>Trade</th>'+
    '<th class="tip" style="min-width:50px" onclick="sb(\'z_score\')"'+tipAttr('z')+'>z</th>'+
    '<th class="tip gend" style="min-width:56px" onclick="sb(\'chan_w_pct\')" data-tip="CHANW% — Channel width: dispersion of price around its own 63-bar regression line (same series z is drawn from). Magnitude amplifier on BUY only — tested at +11.06%/21d vs +7.90% narrow on already-qualifying BUY rows, similar hit rate. Not validated for other regimes; does not set direction or timing.">ChanW%</th>'+
    '<th class="tip" style="min-width:52px" onclick="sb(\'atr_pct\')" data-tip="ATR% — ATR as % of price. Green less than 1% stable/liquid, Red greater than 3% volatile/thin.">ATR%</th>'+
    '<th class="gsep tip gend" style="min-width:120px" onclick="sb(\'regime\')"'+tipAttr('regime')+'>Regime</th>'+
    '<th class="gsep tip" style="min-width:54px" onclick="sb(\'perf_1d\')" data-tip="1D% — Today\'s return">1D%</th>'+
    '<th class="tip" style="min-width:54px" onclick="sb(\'perf_5d\')" data-tip="5D% — 5-bar return">5D%</th>'+
    '<th class="tip gend" style="min-width:54px" onclick="sb(\'perf_1m\')" data-tip="1M% — ~21-bar return">1M%</th></tr>';
}

function toggleWL(){wl=(wl==='UK ETFS')?'MAIN':'UK ETFS';document.getElementById('wltoggle').textContent=(wl==='UK ETFS')?'UK':'US';load();}
function setGrp(g){grp=g;af();}
function setState(s){state=s;af();}
function setRegime(r){regime=r;af();}
function titleCase(s){if(!s)return s;return s.toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});}
function buildGroups(){
  var b=(view==='universe'&&wl)?all.filter(function(r){return r.watchlist===wl||r.watchlist==='BOTH';}):all;
  var gs=Array.from(new Set(b.map(function(r){return r.group_name;}).filter(Boolean))).sort();
  var sel=document.getElementById('gsel');var cur=sel.value;
  sel.innerHTML='<option value="">All Groups</option>'+gs.map(function(g){return'<option value="'+g+'"'+(g===cur?' selected':'')+'>'+titleCase(g)+'</option>';}).join('');
  if(gs.indexOf(grp)<0){sel.value='';grp='';}
}
function base(){
  return all.filter(function(r){
    if(view==='universe'&&wl&&r.watchlist!==wl&&r.watchlist!=='BOTH')return false;
    if(grp&&r.group_name!==grp)return false;
    if(state&&r.state_name!==state)return false;
    if(regime&&r.regime!==regime)return false;
    return true;
  });
}
function af(){
  var s=document.getElementById('sr').value.toLowerCase();
  filt=base().filter(function(r){
    if(s&&(r.symbol||'').toLowerCase().indexOf(s)<0&&(r.name||'').toLowerCase().indexOf(s)<0&&(r.group_name||'').toLowerCase().indexOf(s)<0)return false;
    return true;
  });
  sort();render();
}
function sb(c){if(sc===c)sd*=-1;else{sc=c;sd=-1;}document.querySelectorAll('tr.ch th').forEach(function(t){t.classList.remove('s');});if(event&&event.target)event.target.classList.add('s');sort();render();}
function sort(){filt.sort(function(a,b){var av=a[sc],bv=b[sc];if(av==null)av=sd>0?Infinity:-Infinity;if(bv==null)bv=sd>0?Infinity:-Infinity;if(typeof av==='string')return av.localeCompare(bv)*sd;return(av-bv)*sd;});}

var dash='<span style="color:'+W+'">—</span>';
function numSigned(v,d){if(d===undefined)d=1;if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>0?G:f<0?R:W)+'">'+f.toFixed(d)+'</span>';}
function pctFmt(v,d){if(d===undefined)d=1;if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>0?G:f<0?R:W)+'">'+(f>=0?'+':'')+f.toFixed(d)+'%</span>';}
function slopeCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>0?G:f<0?R:W)+'">'+(f>0?'+':'')+f.toFixed(1)+'%</span>';}
function zCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f<=-1?G:f>=1?R:W)+'">'+(f>0?'+':'')+f.toFixed(2)+'</span>';}
function rocCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>1?G:f<-1?R:W)+'">'+(f>0?'+':'')+f.toFixed(1)+'</span>';}
function stateCell(v){if(!v)return dash;var col=W;if(v==='BULL ACCEL'||v==='BULL ESTAB')col=G;else if(v==='BEAR DECEL'||v==='BEAR ACCEL')col=R;return'<span style="color:'+col+'">'+v+'</span>';}
function flipCell(v,count){var n=parseInt(v)||0;var c=parseInt(count)||0;if(n===0)return dash;var arrow='<span style="color:'+(n>0?G:R)+'">'+(n>0?'▲':'▼')+'</span>';return c>1?arrow+'<span style="color:rgba(255,255,255,0.4);font-size:10px">'+c+'</span>':arrow;}
var REGIME_COL={'BUY':G,'HOLD':W,'WATCH':W,'TRIM':R,'REDUCE':R,'EXIT':R,'STALE':'rgba(255,255,255,0.35)'};
function regimeCell(v){if(!v||v==='—')return dash;return'<span style="color:'+(REGIME_COL[v]||W)+'">'+v+'</span>';}
function portPctCell(v){if(v==null||isNaN(v))return dash;return'<span style="color:'+W+'">'+parseFloat(v).toFixed(1)+'%</span>';}
function maxPctCell(v){if(v==null||isNaN(v))return dash;return'<span style="color:'+W+'">'+parseFloat(v).toFixed(1)+'%</span>';}

function atrPctCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>3?R:f<1?G:W)+'">'+f.toFixed(2)+'%</span>';}
function sharpeCell(v){if(v==null||isNaN(v))return dash;var f=parseFloat(v);return'<span style="color:'+(f>=1?G:f<=-1?R:W)+'">'+(f>0?'+':'')+f.toFixed(2)+'</span>';}
// Channel width cell: magnitude amplifier, only colours green when BUY + above the displayed BUY median (validated condition); white otherwise — not a direction signal
function chanWCell(v,regime,buyMedian){
  if(v==null||isNaN(v))return dash;
  var f=parseFloat(v);
  var isStrongBuy=(regime==='BUY'&&buyMedian!=null&&f>=buyMedian);
  return'<span style="color:'+(isStrongBuy?G:W)+'">'+f.toFixed(2)+'</span>';
}

// === FIX 1: SECTORS — client-side aggregation with watchlist filter ===
async function loadMacroSectors(){
  var host=document.getElementById('macro-host');host.innerHTML='<div class="msg">Loading…</div>';
  try{
    // Fetch raw regime rows filtered by current watchlist — same pattern as universe tab
    var wlParam='watchlist=in.('+encodeURIComponent(wl)+',BOTH)';
    var res=await fetch(SURL+'/rest/v1/v_2h_regime?select=symbol,group_name,trend,momentum,state_name,regime,perf_1d,perf_5d&'+wlParam+'&limit=300',{headers:H});
    if(!res.ok)throw new Error('sectors: '+res.status);
    var rows=await res.json();
    // Aggregate by group_name client-side — one row per group, no double-counting
    var groups={};
    rows.forEach(function(r){
      if(!r.group_name||r.group_name==='VOLATILITY')return;
      var g=r.group_name;
      if(!groups[g])groups[g]={group_name:g,n:0,trend_sum:0,mom_sum:0,p1_sum:0,p5_sum:0};
      var d=groups[g];
      d.n++;
      d.trend_sum+=(parseFloat(r.trend)||0);
      d.mom_sum+=(parseFloat(r.momentum)||0);
      d.p1_sum+=(parseFloat(r.perf_1d)||0);
      d.p5_sum+=(parseFloat(r.perf_5d)||0);
    });
    // Compute averages and derive state from avg trend/momentum
    var agg=Object.values(groups).map(function(g){
      g.avg_trend=g.n?g.trend_sum/g.n:0;
      g.avg_mom=g.n?g.mom_sum/g.n:0;
      g.avg_1d=g.n?g.p1_sum/g.n:0;
      g.avg_5d=g.n?g.p5_sum/g.n:0;
      var t=g.avg_trend,m=g.avg_mom;
      if(t>=0&&m>=0&&m>=t)g.state='BULL ACCEL';
      else if(t>=0&&m>=0&&m<t)g.state='BULL ESTAB';
      else if(t>=0&&m<0)g.state='BULL FADING';
      else if(t<0&&m>=0)g.state='EARLY RECV';
      else if(t<0&&m<0&&m>=t)g.state='BEAR DECEL';
      else g.state='BEAR ACCEL';
      return g;
    });
    agg.sort(function(a,b){return b.avg_trend-a.avg_trend;});
    var tableRows=agg.map(function(d){
      var p1=d.avg_1d,p5=d.avg_5d;
      return'<tr>'+
        '<td style="padding-left:16px"><span style="color:'+W+'">'+d.group_name+'</span></td>'+
        '<td><span style="color:'+W+'">'+d.n+'</span></td>'+
        '<td class="gsep-lg">'+numGrad(d.avg_trend)+'</td>'+
        '<td class="gend">'+numGrad(d.avg_mom)+'</td>'+
        '<td class="gsep gend">'+macroStateCell(d.state)+'</td>'+
        '<td class="gsep"><span style="color:'+(p1>0?G:p1<0?R:W)+'">'+(p1>=0?'+':'')+p1.toFixed(2)+'%</span></td>'+
        '<td class="gend"><span style="color:'+(p5>0?G:p5<0?R:W)+'">'+(p5>=0?'+':'')+p5.toFixed(2)+'%</span></td>'+
        '</tr>';
    }).join('');
    host.innerHTML='<table><thead>'+
      '<tr class="gh"><th class="blank" colspan="2"></th><th colspan="2" class="gsep-lg gend">Position</th><th class="gsep gend">State</th><th colspan="2" class="gsep gend">Recent</th></tr>'+
      '<tr class="ch"><th style="min-width:160px;padding-left:16px">Sector</th><th style="min-width:48px">#</th>'+
      '<th class="gsep-lg" style="min-width:56px">Trend</th><th class="gend" style="min-width:56px">Mom</th>'+
      '<th class="gsep gend" style="min-width:120px">State</th>'+
      '<th class="gsep" style="min-width:70px">1D%</th><th class="gend" style="min-width:70px">5D%</th></tr></thead>'+
      '<tbody>'+tableRows+'</tbody></table>';
  }catch(e){host.innerHTML='<div class="msg" style="color:'+R+'">Error — '+e.message+'</div>';}
}

  host.innerHTML='<table><thead><tr class="gh"><th class="blank" colspan="2"></th><th class="gsep-lg gend">Direction</th><th colspan="3" class="gsep gend">Location</th><th colspan="2" class="gsep gend">Count</th><th class="gsep">Posture</th></tr><tr class="ch"><th style="min-width:120px;padding-left:16px">Watchlist</th><th style="min-width:64px">Tickers</th><th class="gsep-lg" style="min-width:80px">Trend Up</th><th class="gend" style="min-width:80px">Trade Up</th><th class="gsep" style="min-width:64px">Cheap</th><th class="gend" style="min-width:80px">Stretched</th><th class="gsep gend" style="min-width:72px">Locked</th><th class="gsep" style="min-width:64px">Entry</th><th class="gend" style="min-width:72px">Defend</th><th class="gsep gend" style="min-width:110px">Posture</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }catch(e){host.innerHTML='<div class="msg" style="color:'+R+'">Error — '+e.message+'</div>';}
}

// === FIX 3: VOLATILITY — with Sharpe spread column (client-side) ===
async function loadMacroVolatility(){
  document.getElementById('wrap-macro').style.display='none';
  document.getElementById('wrap-main').style.display='';
  document.getElementById('filterbar').style.display='none';
  document.getElementById('macroSubNav').style.display='';
  grp='VOLATILITY';
  try{
    var tb=document.getElementById('tb');tb.innerHTML='<tr><td colspan="20" class="msg">Loading…</td></tr>';
    var [regRes,posRes]=await Promise.all([
      fetch(SURL+'/rest/v1/v_2h_regime?select='+REGIME_COLS+',atr,close&group_name=eq.VOLATILITY&limit=100',{headers:H}),
      fetch(SURL+'/rest/v1/positions?select=symbol',{headers:H})
    ]);
    if(!regRes.ok)throw new Error('volatility: '+regRes.status);
    if(posRes.ok){var pos=await posRes.json();positions=new Set(pos.map(function(p){return p.symbol;}));if(positions.has('BIT-XBTE'))positions.add('BTCUSD');}
    var volData=(await regRes.json()).map(parseRow);

    // Compute Sharpe proxy per ticker: perf_1m / (annualised vol proxy)
    // Vol proxy = (atr/close) * sqrt(252) * 100  →  annualised vol %
    // Sharpe proxy = perf_1m / vol_proxy  (21-bar return / annualised vol)
    // Then z-score across the group
    var sharpeVals=volData.map(function(r){
      var p=parseFloat(r.perf_1m),a=parseFloat(r.atr),c=parseFloat(r.close);
      if(!p||!a||!c||c===0)return null;
      var volPct=(a/c)*Math.sqrt(252)*100;
      return volPct>0?p/volPct:null;
    });
    var valid=sharpeVals.filter(function(v){return v!=null;});
    var mean=valid.length?valid.reduce(function(s,v){return s+v;},0)/valid.length:0;
    var std=valid.length>1?Math.sqrt(valid.reduce(function(s,v){return s+(v-mean)*(v-mean);},0)/valid.length):1;
    if(std===0)std=1;
    volData.forEach(function(r,i){
      r.sharpe_z=sharpeVals[i]!=null?(sharpeVals[i]-mean)/std:null;
    });

    all=volData;
    // Custom header for vol tab — adds Sharpe column
    var h=document.getElementById('th-host');
    h.innerHTML=
      '<tr class="gh"><th class="blank" colspan="2"></th>'+
      '<th colspan="4" class="gsep-lg gend">State + Flips</th>'+
      '<th colspan="4" class="gsep gend">Core</th>'+
      '<th colspan="1" class="gsep gend">Regime</th>'+
      '<th colspan="3" class="gsep gend">Recent</th>'+
      '<th colspan="1" class="gsep gend">Sharpe</th></tr>'+
      '<tr class="ch">'+
      '<th style="min-width:70px;padding-left:16px" onclick="sb(\'symbol\')">Ticker</th>'+
      '<th style="min-width:80px;max-width:100px" onclick="sb(\'group_name\')">Group</th>'+
      '<th class="gsep-lg tip" style="min-width:110px" onclick="sb(\'state_name\')">State</th>'+
      '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_s\')">S</th>'+
      '<th class="tip" style="min-width:28px;text-align:center" onclick="sb(\'flip_t\')">T</th>'+
      '<th class="tip gend" style="min-width:28px;text-align:center" onclick="sb(\'flip_m\')">M</th>'+
      '<th class="gsep tip" style="min-width:62px" onclick="sb(\'slope\')">Slope</th>'+
      '<th class="tip" style="min-width:52px" onclick="sb(\'trend\')">Trend</th>'+
      '<th class="tip" style="min-width:52px" onclick="sb(\'momentum\')">Trade</th>'+
      '<th class="tip gend" style="min-width:50px" onclick="sb(\'z_score\')">z</th>'+
      '<th class="gsep tip gend" style="min-width:120px" onclick="sb(\'regime\')">Regime</th>'+
      '<th class="gsep tip" style="min-width:54px" onclick="sb(\'perf_1d\')">1D%</th>'+
      '<th class="tip" style="min-width:54px" onclick="sb(\'perf_5d\')">5D%</th>'+
      '<th class="tip gend" style="min-width:54px" onclick="sb(\'perf_1m\')">1M%</th>'+
      '<th class="gsep tip gend" style="min-width:60px" onclick="sb(\'sharpe_z\')" data-tip="SHARPE SPREAD — 21-bar return divided by annualised ATR vol, z-scored vs group. Green = high Sharpe outlier (good risk-adjusted return). Red = poor. Backtested spread: 1.47.">Shrp-z</th>'+
      '</tr>';

    // Custom render for vol tab — extra sharpe_z column
    filt=volData;sort();
    tb.innerHTML=filt.map(function(r){
      var isHeld=positions.has(r.symbol);
      var nameEsc=(r.name||'').replace(/"/g,'&quot;');
      var tk=isHeld?'<td class="held" title="'+nameEsc+'"><span style="color:'+W+';font-weight:600">'+r.symbol+'</span></td>':'<td title="'+nameEsc+'"><span style="color:'+W+';font-weight:600">'+r.symbol+'</span></td>';
      return'<tr>'+tk+
        '<td><span style="color:'+W+';max-width:100px;overflow:hidden;text-overflow:ellipsis;display:block;white-space:nowrap;font-size:11px">'+(r.group_name||'')+'</span></td>'+
        '<td class="gsep-lg">'+stateCell(r.state_name)+'</td>'+
        '<td style="text-align:center">'+flipCell(r.flip_s)+'</td>'+
        '<td style="text-align:center">'+flipCell(r.flip_t)+'</td>'+
        '<td class="gend" style="text-align:center">'+flipCell(r.flip_m)+'</td>'+
        '<td class="gsep">'+slopeCell(r.slope)+'</td>'+
        '<td>'+numSigned(r.trend)+'</td>'+
        '<td>'+numSigned(r.momentum)+'</td>'+
        '<td class="gend">'+zCell(r.z_score)+'</td>'+
        '<td class="gsep gend">'+regimeCell(r.regime)+'</td>'+
        '<td class="gsep">'+pctFmt(r.perf_1d)+'</td>'+
        '<td>'+pctFmt(r.perf_5d)+'</td>'+
        '<td class="gend">'+pctFmt(r.perf_1m)+'</td>'+
        '<td class="gsep gend">'+sharpeCell(r.sharpe_z)+'</td>'+
        '</tr>';
    }).join('');
  }catch(e){document.getElementById('tb').innerHTML='<tr><td colspan="20" class="msg" style="color:'+R+'">Error — '+e.message+'</td></tr>';}
}

// === SPEC ===
async function openSpec(){document.getElementById('specOverlay').classList.add('on');var body=document.getElementById('specBody'),head=document.getElementById('specHead');body.textContent='Loading…';head.textContent='...';
try{var res=await fetch(SURL+'/rest/v1/spec_2h_sections?select=section_order,section_title,content,updated_at&order=section_order.asc',{headers:H});if(!res.ok)throw new Error('HTTP '+res.status);var s=await res.json();if(!s.length){body.textContent='Empty.';return;}
var latest=s.reduce(function(a,x){var d=new Date(x.updated_at);return d>a?d:a;},new Date(0));
body.textContent=s.map(function(x){return x.section_order+'. '+x.section_title+'\n'+'='.repeat(x.section_title.length)+'\n'+x.content.trim()+'\n';}).join('\n\n');
head.textContent=s.length+' sections · updated '+latest.toISOString().slice(0,10);
}catch(e){body.textContent='Error: '+e.message;}}
function closeSpec(){document.getElementById('specOverlay').classList.remove('on');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSpec();});

renderHeader();load();setInterval(load,3*60*1000);
</script>
